// KAHRAMAN MAĞAZASI
// ══════════════════════════════════════════════════════════
function HeroShop({ coins, ownedHeroes, equippedHero, best, onBuy, onEquip, onClose }) {
  const [hov, setHov] = useState(null);
  const pvRef = useRef(null); const pvRaf = useRef(null); const pvT = useRef(0);
  const prevHero = hov!=null ? HEROES.find(h=>h.id===hov) : (equippedHero!=null ? HEROES.find(h=>h.id===equippedHero) : HEROES[0]);

  useEffect(()=>{
    const c=pvRef.current; if(!c) return;
    const ctx=c.getContext("2d");
    const loop=()=>{
      pvT.current++;
      ctx.clearRect(0,0,110,110);
      if(prevHero){
        // Glow
        ctx.fillStyle=prevHero.glow+"44";
        ctx.beginPath(); ctx.arc(55,52,44,0,Math.PI*2); ctx.fill();
        drawBlob(ctx,55,52,prevHero.col,1,pvT.current,true,false,true,false,null);
      }
      pvRaf.current=requestAnimationFrame(loop);
    };
    pvRaf.current=requestAnimationFrame(loop);
    return()=>cancelAnimationFrame(pvRaf.current);
  },[prevHero?.id]);

  return(
    <div style={{position:"fixed",inset:0,background:"linear-gradient(160deg,#040008,#0a0018)",fontFamily:"'Courier New',monospace",display:"flex",flexDirection:"column",zIndex:55}}>
      <style>{`@keyframes heroPulse{0%,100%{box-shadow:0 0 12px currentColor}50%{box-shadow:0 0 28px currentColor}}`}</style>

      {/* Üst bar */}
      <div style={{display:"flex",alignItems:"center",padding:"12px 16px",borderBottom:"1px solid rgba(255,255,255,0.08)",flexShrink:0,gap:10}}>
        <div style={{fontFamily:"'Fredoka One',sans-serif",fontSize:18,color:"#c084fc",letterSpacing:3}}>⚔️ KAHRAMAN SEÇ</div>
        <div style={{flex:1}}/>
        <div style={{background:"rgba(253,224,71,0.15)",border:"1px solid rgba(253,224,71,0.4)",borderRadius:8,padding:"5px 10px",color:"#fde047",fontSize:12,fontWeight:700}}>🪙{coins}</div>
        <button onClick={onClose} style={{background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.2)",borderRadius:8,padding:"5px 10px",color:"#fff",fontSize:14,cursor:"pointer",WebkitTapHighlightColor:"transparent"}}>✕</button>
      </div>

      {/* Önizleme + bilgi */}
      <div style={{display:"flex",gap:12,padding:"10px 14px",borderBottom:"1px solid rgba(255,255,255,0.06)",flexShrink:0,alignItems:"center"}}>
        <div style={{textAlign:"center",flexShrink:0}}>
          <canvas ref={pvRef} width={110} height={110} style={{animation:"blobFloat 2s ease-in-out infinite"}}/>
          <div style={{color:"rgba(255,255,255,0.25)",fontSize:8,letterSpacing:2,marginTop:2}}>
            {prevHero?.name}
          </div>
        </div>
        {prevHero && (
          <div style={{flex:1,background:`${prevHero.glow}18`,border:`1px solid ${prevHero.glow}44`,borderRadius:10,padding:"10px 12px"}}>
            <div style={{fontFamily:"'Fredoka One',sans-serif",fontSize:16,color:prevHero.glow,marginBottom:4}}>{prevHero.powerEmoji} {prevHero.powerName}</div>
            <div style={{fontSize:11,color:"rgba(255,255,255,0.6)",lineHeight:1.5,marginBottom:6}}>{prevHero.powerDesc}</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {[["⚔️ Kılıç",prevHero.swordDmg+"x"],["💥 Boss",prevHero.bossDmg+"x"],["⏱️ Süre",prevHero.dur>=9000?"∞":Math.ceil(prevHero.dur/60)+"s"],["🔁 CD",prevHero.cd>=9000?"1 kez":Math.ceil(prevHero.cd/60)+"s"]].map(([l,v])=>(
                <div key={l} style={{background:"rgba(255,255,255,0.07)",borderRadius:5,padding:"2px 7px",fontSize:9,color:"#aaa"}}>
                  <span style={{color:"#555"}}>{l}: </span><span style={{color:"#fff"}}>{v}</span>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      {/* Hero grid */}
      <div style={{flex:1,overflowY:"auto",padding:"8px 12px",WebkitOverflowScrolling:"touch"}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(90px,1fr))",gap:7}}>
          {HEROES.map(h=>{
            const unlocked2 = ownedHeroes.includes(h.id) || isHeroUnlocked(h,best);
            const isEq = equippedHero===h.id;
            const canAfford = coins >= h.price;
            const alreadyOwned = ownedHeroes.includes(h.id);
            return(
              <div key={h.id}
                onMouseEnter={()=>setHov(h.id)} onMouseLeave={()=>setHov(null)}
                onTouchStart={()=>setHov(h.id)}

function Shop({ coins, owned, equipped, onBuy, onEquip, onClose }) {
  const [filter, setFilter] = useState("all");
  const [search, setSearch] = useState("");
  const filtered = COSTUMES.filter(c => {
    if (filter === "boss") return c.bossReward === true;
    if (filter !== "all" && c.rarity !== filter) return false;
    if (filter === "all") return true;
    if (search && !c.name.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });
  const previewRef = useRef(null);
  const [hovered, setHovered] = useState(null);
  const pvRaf = useRef(null); const pvTick = useRef(0);

  useEffect(() => {
    const c = previewRef.current; if (!c) return;
    const ctx = c.getContext("2d");
    const prev = hovered ? COSTUMES.find(x=>x.id===hovered) : (equipped != null ? COSTUMES.find(x=>x.id===equipped) : null);
    const loop = () => {
      pvTick.current++;
      ctx.clearRect(0,0,110,110);
      const col = prev ? prev.col : "#ff6b6b";
      drawBlob(ctx, 55, 62, col, 1, pvTick.current, true, false, false, false, prev);
      pvRaf.current = requestAnimationFrame(loop);
    };
    pvRaf.current = requestAnimationFrame(loop);
    return () => cancelAnimationFrame(pvRaf.current);
  }, [hovered, equipped]);

  return (
    <div style={{position:"fixed",inset:0,background:"linear-gradient(160deg,#04040f,#0d0020,#04040f)",fontFamily:"'Courier New',monospace",display:"flex",flexDirection:"column",zIndex:50}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');
        .citem:active{transform:scale(0.95)!important}
        ::-webkit-scrollbar{width:3px} ::-webkit-scrollbar-thumb{background:#2a2a4a}
      `}</style>

      {/* Üst bar */}
      <div style={{display:"flex",alignItems:"center",padding:"14px 16px",borderBottom:"1px solid rgba(255,255,255,0.08)",flexShrink:0,gap:12}}>
        <div style={{fontFamily:"'Fredoka One',sans-serif",fontSize:20,color:"#fde047",letterSpacing:3}}>🛍️ KOSTÜM MAĞAZASI</div>
        <div style={{flex:1}}/>
        <div style={{background:"rgba(253,224,71,0.15)",border:"1px solid rgba(253,224,71,0.4)",borderRadius:8,padding:"6px 12px",color:"#fde047",fontSize:13,fontWeight:700}}>🪙 {coins}</div>
        <button onClick={onClose} style={{background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.2)",borderRadius:8,padding:"6px 12px",color:"#fff",fontSize:13,cursor:"pointer",WebkitTapHighlightColor:"transparent"}}>✕</button>
      </div>

      {/* Preview + Filtre */}
      <div style={{display:"flex",gap:12,padding:"12px 16px",borderBottom:"1px solid rgba(255,255,255,0.06)",flexShrink:0,alignItems:"center"}}>
        <div style={{textAlign:"center",flexShrink:0}}>
          <canvas ref={previewRef} width={110} height={110} style={{animation:"blobFloat 2s ease-in-out infinite"}}/>
          <div style={{color:"rgba(255,255,255,0.3)",fontSize:8,letterSpacing:2,marginTop:2}}>
            {hovered!=null ? COSTUMES.find(c=>c.id===hovered)?.name : equipped!=null ? "KUŞANILAN" : "ÖNIZLEME"}
          </div>
        </div>
        <div style={{flex:1}}>
          {/* Arama */}
          <input placeholder="🔍 Ara..." value={search} onChange={e=>setSearch(e.target.value)}
            style={{width:"100%",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:8,padding:"7px 10px",color:"#fff",fontSize:11,marginBottom:8,outline:"none",fontFamily:"'Courier New',monospace"}}/>
          {/* Nadirlik filtresi */}
          <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
            {[["all","Tümü","#fff"],["common","Yaygın","#94a3b8"],["rare","Nadir","#60a5fa"],["epic","Epik","#a78bfa"],["legendary","Efsane","#fbbf24"],["boss","Boss","#ff4466"]].map(([k,l,c])=>(
              <button key={k} onClick={()=>setFilter(k)}
                style={{background:filter===k?`${c}22`:"rgba(255,255,255,0.04)",border:`1px solid ${filter===k?c:"rgba(255,255,255,0.1)"}`,borderRadius:6,padding:"4px 8px",color:filter===k?c:"rgba(255,255,255,0.4)",fontSize:9,cursor:"pointer",letterSpacing:1,WebkitTapHighlightColor:"transparent"}}>
                {l}
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* Kostüm grid */}
      <div style={{flex:1,overflowY:"auto",padding:"10px 12px",WebkitOverflowScrolling:"touch"}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(100px,1fr))",gap:8}}>
          {filtered.map(c => {
            const isOwned   = c.id===0 || owned.includes(c.id);
            const isEquipped = equipped === c.id;
            const canAfford = coins >= c.price;
            const rs = RARITY_STYLE[c.rarity];
            return (
              <div key={c.id} className="citem"
                onMouseEnter={()=>setHovered(c.id)} onMouseLeave={()=>setHovered(null)}
                onTouchStart={()=>setHovered(c.id)}
                style={{background:isEquipped?`${rs.color}22`:isOwned?"rgba(255,255,255,0.06)":"rgba(255,255,255,0.03)",border:`2px solid ${isEquipped?rs.color:isOwned?"rgba(255,255,255,0.15)":"rgba(255,255,255,0.07)"}`,borderRadius:10,padding:"8px 6px",textAlign:"center",cursor:"pointer",transition:"all 0.12s",opacity:!isOwned&&!canAfford?0.45:1,boxShadow:isEquipped?`0 0 14px ${rs.glow}`:isOwned?`0 0 6px ${rs.glow}`:"none"}}>
                {/* Renk daire */}
                <div style={{width:36,height:36,borderRadius:"50%",background:c.col,margin:"0 auto 5px",boxShadow:`0 0 12px ${c.col}88`,border:isEquipped?"2px solid #fff":"none",fontSize:isEquipped?10:0,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700}}>
                  {isEquipped?"✓":""}
                </div>
                <div style={{fontSize:9,color:rs.color,letterSpacing:0.5,lineHeight:1.2,fontWeight:700}}>{c.name}</div>
                <div style={{fontSize:7,color:"rgba(255,255,255,0.25)",marginTop:1}}>{c.bossReward?"👹Boss Ödülü":rs.label}</div>
                {!isOwned && !c.bossReward && <div style={{fontSize:8,color:canAfford?"#fde047":"#ef4444",marginTop:3}}>🪙{c.price}</div>}
                {!isOwned && c.bossReward && <div style={{fontSize:8,color:"#ff4466",marginTop:3}}>Boss'u yen!</div>}
                {isOwned && !isEquipped && <div style={{fontSize:7,color:"#4ade80",marginTop:3}}>SAHİP</div>}

                {/* Aksiyon butonu */}
                <button
                  onClick={e=>{e.stopPropagation(); isOwned ? onEquip(c.id) : (!c.bossReward && canAfford && onBuy(c.id));}}
                  style={{marginTop:5,width:"100%",background:isEquipped?"#fbbf24":isOwned?"#4ade80":c.bossReward?"#7f1d1d":canAfford?"#6366f1":"#374151",border:"none",color:isEquipped||isOwned?"#000":"#fff",padding:"4px 0",borderRadius:5,fontSize:8,cursor:isOwned?"pointer":"not-allowed",fontWeight:700,WebkitTapHighlightColor:"transparent",letterSpacing:0.5}}>
                  {isEquipped?"KUŞANILDI":isOwned?"KUŞAN":c.bossReward?"🔒 BOSS":"YETERSİZ"}
                </button>
              </div>
            );
          })}
        </div>
        <div style={{height:20}}/>
      </div>
    </div>
  );
}

const SAVE_KEY = "parkur_save_v2";

function loadSave() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch(e) { return null; }
}

function writeSave(data) {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(data)); } catch(e) {}
}

function deleteSave() {
  try { localStorage.removeItem(SAVE_KEY); } catch(e) {}
}

// Kayıt yükleme ekranı
function SaveScreen({ onLoad, onNew }) {
  const save = loadSave();

function App() {
  const [scene,    setScene]    = useState("loading"); // loading -> menu
  const [lv,       setLv]       = useState(ALL[0]);
  const [col,      setCol]      = useState(PCOLS[0]);
  const [gKey,     setGKey]     = useState(0);
  const [unlocked, setUnlocked] = useState([0]);
  const [best,     setBest]     = useState({});
  const [showCfg,  setShowCfg]  = useState(false);
  const [cfg,      setCfg]      = useState({ vol:0.35, sfxVol:0.35, btnSz:68, accent:"#a78bfa", vibration:true, particles:"Yüksek", screenShake:true, theme:"dark" });
  const [coins,    setCoins]    = useState(0);
  const [owned,    setOwned]    = useState([0]);
  const [equipped, setEquipped] = useState(0);
  const [showShop,   setShowShop]   = useState(false);
  const [showHeroShop,setShowHeroShop]=useState(false);
  const [lastReward, setLastReward] = useState(0);
  const [ownedHeroes,setOwnedHeroes]= useState([0]);
  const [equippedHero,setEquippedHero]=useState(0);
  const [dailyQuests, setDailyQuests] = useState(() => getDailyQuestsForToday());
  const [dailyDate,   setDailyDate]   = useState(() => Math.floor(Date.now()/86400000));
  const [stats, setStats] = useState({ totalFinished:0, bossKills:0, maxCombo:0, totalSlash:0, totalDash:0 });
  const [bossCostume, setBossCostume] = useState(null); // kazanılan boss kostüm id

  const activeCostume = COSTUMES.find(c => c.id === equipped) || null;
  const activeHero    = HEROES.find(h => h.id === equippedHero) || null;

  // AudioContext kullanıcı etkileşimi olmadan başlatmaya çalış
  useEffect(() => {
    try {
      AudioMgr.ctx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) {}
    // Başlat
    const startAudio = () => {
      AudioMgr.init();
      if (AudioMgr.ctx?.state === "suspended") AudioMgr.ctx.resume().then(() => AudioMgr.startMusic("menu"));
      else AudioMgr.startMusic("menu");
    };
    startAudio();
    document.addEventListener("touchstart", startAudio, { once: true });
    document.addEventListener("click", startAudio, { once: true });
  }, []);

  // Uygulama açılınca otomatik kayıt yükle
  useEffect(() => {
    const save = loadSave();
    if (save) {
      setUnlocked(save.unlocked || [0]);
      setBest(save.best || {});
      if (save.col) setCol(save.col);
      if (save.cfg) { setCfg(save.cfg); AudioMgr.setVol(save.cfg.vol); }
      if (save.coins != null) setCoins(save.coins);
      if (save.owned) setOwned(save.owned);
      if (save.equipped != null) setEquipped(save.equipped);
      if (save.ownedHeroes) setOwnedHeroes(save.ownedHeroes);
      if (save.equippedHero != null) setEquippedHero(save.equippedHero);
    }
    // İlk girişte tutorial
    const visited = localStorage.getItem("blobrun_visited");
    // İlk ziyaret kaydedilir, tutorial menüde buton olarak var
    if (!visited) localStorage.setItem("blobrun_visited","1");
    setScene("menu");
  }, []);

  const doSave = useCallback((extra={}) => {
    if (scene === "save") return;
    writeSave({ unlocked, best, col, maxLevel:Math.max(...unlocked), date:new Date().toLocaleDateString("tr-TR"), cfg, coins, owned, equipped, ownedHeroes, equippedHero, ...extra });
  }, [scene, unlocked, best, col, cfg, coins, owned, equipped]);

  useEffect(() => { doSave(); }, [unlocked, best, coins, owned, equipped]);

  const loadGame = useCallback((save) => {
    setUnlocked(save.unlocked || [0]);
    setBest(save.best || {});
    if (save.col) setCol(save.col);
    if (save.cfg) { setCfg(save.cfg); AudioMgr.setVol(save.cfg.vol); }
    if (save.coins != null) setCoins(save.coins);
    if (save.owned) setOwned(save.owned);
    if (save.equipped != null) setEquipped(save.equipped);
    if (save.ownedHeroes) setOwnedHeroes(save.ownedHeroes);
    if (save.equippedHero != null) setEquippedHero(save.equippedHero);
    setScene("menu");
  }, []);

  const newGame = useCallback(() => {
    deleteSave();
    setUnlocked([0]); setBest({}); setCol(PCOLS[0]);
    setCoins(0); setOwned([0]); setEquipped(0); setOwnedHeroes([0]); setEquippedHero(0);
    setScene("menu");
  }, []);

  const play = useCallback((l, c) => {
    setLv(l); setCol(c); setGKey(k=>k+1); setScene("game");
  }, []);

  const handleWin = useCallback(() => {
    const nid = lv.id+1;
    const newUnlocked = unlocked.includes(nid) ? unlocked : [...unlocked, nid];
    const newBest = {...best, [lv.id]: true};
    const reward = levelReward(lv.id);
    const newCoins = coins + reward;
    // Boss ödülü: boss kostümü ver
    let newOwned = owned;
    let newEquipped = equipped;
    let bossCostumeId = null;
    if (lv.isBoss && lv.boss) {
      const bdef = BDEFS[lv.boss.id];
      if (bdef && bdef.costumeId != null && !owned.includes(bdef.costumeId)) {
        newOwned = [...owned, bdef.costumeId];
        newEquipped = bdef.costumeId;
        bossCostumeId = bdef.costumeId;
      }
    }
    // 100. bölüm: tüm boss kostümleri + en iyi karakter (id:29) aç
    if (lv.id === 99) {
      const allBossCostumes = BDEFS.map(b=>b.costumeId).filter(id2=>!newOwned.includes(id2));
      newOwned = [...newOwned, ...allBossCostumes, 39]; // id:39 = Evren (efsane)
      newEquipped = 63; // Kaos Tanrısı kostümü
      bossCostumeId = 63;
    }
    if (nid < 100) setUnlocked(newUnlocked);
    setBest(newBest); setCoins(newCoins); setLastReward(reward);
    setOwned(newOwned); setEquipped(newEquipped);
    setBossCostume(bossCostumeId);
    writeSave({ unlocked:newUnlocked, best:newBest, col, maxLevel:Math.max(...newUnlocked), date:new Date().toLocaleDateString("tr-TR"), cfg, coins:newCoins, owned:newOwned, equipped:newEquipped });
    // Günlük görev güncelle
    setStats(prev => {
      const ns = {...prev, totalFinished: prev.totalFinished+1};
      if (lv.isBoss) ns.bossKills = prev.bossKills+1;
      return ns;
    });
    // Yeni gün kontrolü
    const today = Math.floor(Date.now()/86400000);
    if (today !== dailyDate) { setDailyDate(today); setDailyQuests(getDailyQuestsForToday()); }
    AudioMgr.sfx("unlock");
    setScene("win");
  }, [lv, unlocked, best, col, cfg, coins, owned, equipped]);

  const handleBuy = useCallback((cid) => {
    const c2 = COSTUMES.find(x=>x.id===cid);
    if (!c2 || coins < c2.price || owned.includes(cid)) return;
    const nc = coins - c2.price; const no = [...owned, cid];
    setCoins(nc); setOwned(no); setEquipped(cid);
    AudioMgr.sfx("unlock");
  }, [coins, owned]);

  const handleEquip = useCallback((cid) => {
    setEquipped(cid); AudioMgr.sfx("save");
  }, []);
  const handleBuyHero = useCallback((hid) => {
    const h = HEROES.find(x=>x.id===hid);
    if (!h || coins < h.price || ownedHeroes.includes(hid)) return;
    const nc = coins - h.price; const no2 = [...ownedHeroes, hid];
    setCoins(nc); setOwnedHeroes(no2); setEquippedHero(hid);
    AudioMgr.sfx("unlock");
  }, [coins, ownedHeroes]);
  const handleEquipHero = useCallback((hid) => {
    setEquippedHero(hid); AudioMgr.sfx("save");
  }, []);

  const handleCfgChange = useCallback(nc => {
    setCfg(nc); AudioMgr.setVol(nc.vol);
  }, []);

  return (
    <>
      {showCfg  && <SettingsModal s={cfg} onChange={handleCfgChange} onClose={()=>setShowCfg(false)} onQuit={scene==="game"?()=>{AudioMgr.stopMusic();setShowCfg(false);setScene("menu");}:null}/>}
      {showShop && <Shop coins={coins} owned={owned} equipped={equipped} onBuy={handleBuy} onEquip={handleEquip} onClose={()=>setShowShop(false)}/>}
      {showHeroShop && <HeroShop coins={coins} ownedHeroes={ownedHeroes} equippedHero={equippedHero} best={best} onBuy={handleBuyHero} onEquip={handleEquipHero} onClose={()=>setShowHeroShop(false)}/>}
      {scene==="loading" && <div style={{position:"fixed",inset:0,background:"#04040f",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{color:"#4ade80",fontSize:16,fontFamily:"monospace"}}>Yükleniyor...</div></div>}
      {scene==="menu"  && <Menu unlocked={unlocked} best={best} cfg={cfg} coins={coins} equippedCostume={activeCostume} activeHero={activeHero} dailyQuests={dailyQuests} stats={stats} onCfg={()=>setShowCfg(true)} onShop={()=>setShowShop(true)} onHeroShop={()=>setShowHeroShop(true)} onStart={play} onTutorial={()=>{AudioMgr.stopMusic();play(TUTORIAL_LEVEL,col);}}/>}
      {scene==="game"  && <Game key={gKey} lv={lv} col={activeCostume ? activeCostume.col : col} btnSz={cfg.btnSz} cfg={cfg} activeCostume={activeCostume} activeHero={activeHero} onWin={handleWin} onDie={()=>setScene("death")} onBack={()=>setScene("menu")} onSettings={()=>setShowCfg(true)}/>}
      {scene==="win"   && <WinScreen lv={lv} reward={lastReward} totalCoins={coins} bossCostume={bossCostume!=null?COSTUMES.find(c=>c.id===bossCostume):null} onReplay={()=>{setBossCostume(null);play(lv,col);}} onMenu={()=>{setBossCostume(null);setScene("menu");}} onNext={()=>{setBossCostume(null);const n=ALL[lv.id+1]; if(n)play(n,col); else setScene("menu");}}/>}
      {scene==="death" && <DeathScreen lv={lv} onReplay={()=>play(lv,col)} onMenu={()=>setScene("menu")}/>}
    </>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
</body>
</html>
