  init() {
    if (this.ctx) return;
    try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  },

  note(freq, type, dur, vol, delay) {
    if (!this.ctx || vol <= 0) return;
    const d = delay || 0;
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.connect(g); g.connect(this.ctx.destination);
    o.type = type; o.frequency.value = freq;
    const t = this.ctx.currentTime + d;
    g.gain.setValueAtTime(vol * this.vol, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.start(t); o.stop(t + dur + 0.05);
  },

  startMusic(mapKey) {
    this.stopMusic();
    if (!this.ctx) return;
    this.mapKey = mapKey || "menu";
    const tk = this.TRACKS[this.mapKey] || this.TRACKS.menu;
    this.playing = true;
    let step = 0;
    const interval = tk.bpm;
    this.iv = setInterval(() => {
      if (!this.playing) return;
      const mel = tk.melody[step % tk.melody.length];
      if (mel > 0) this.note(mel, tk.type, (interval / 1000) * 0.75, 0.15);
      const b = tk.bass[Math.floor(step / 2) % tk.bass.length];
      if (step % 2 === 0) this.note(b, tk.bassType, (interval / 1000) * 1.5, 0.13);
      // Davul (kick)
      if (tk.kick) {
        if (step % 8 === 0) this.note(80, "sine", 0.07, 0.22);
        if (step % 8 === 4) this.note(100, "sine", 0.05, 0.16);
      }
      // Hi-hat
      if (tk.hihat && step % 4 === 2) this.note(900, "square", 0.02, 0.07);
      // Boss muzigi icin ekstra bas vurusu
      if (this.mapKey === "boss" && step % 4 === 0) this.note(55, "sawtooth", 0.1, 0.18);
      // Kaos: rastgele ek nota
      if (this.mapKey === "chaos" && Math.random() < 0.25) {
        const cr = [196, 247, 330, 415, 523, 659][Math.floor(Math.random()*6)];
        this.note(cr, "square", 0.08, 0.06);
      }
      step++;
    }, interval);
  },

  stopMusic() {
    this.playing = false;
    if (this.iv) { clearInterval(this.iv); this.iv = null; }
  },

  sfx(type) {
    if (!this.ctx) return;
    const s = {
      jump:   () => { this.note(330,"sine",0.12,0.18); this.note(440,"sine",0.06,0.12,0.08); },
      land:   () => this.note(120,"sine",0.07,0.14),
      slash:  () => { this.note(880,"square",0.08,0.18); this.note(660,"sawtooth",0.06,0.14,0.06); },
      hit:    () => { this.note(200,"sawtooth",0.1,0.22); this.note(150,"sine",0.05,0.12,0.08); },
      die:    () => { this.note(220,"sawtooth",0.3,0.25); this.note(110,"sawtooth",0.2,0.22,0.15); },
      win:    () => { [523,659,784,1047].forEach((f,i)=>this.note(f,"triangle",0.22,0.2,i*0.12)); },
      boss:   () => { this.note(60,"sawtooth",0.25,0.28); this.note(90,"square",0.1,0.2,0.1); },
      unlock: () => { [659,784,1047].forEach((f,i)=>this.note(f,"triangle",0.18,0.18,i*0.09)); },
      save:   () => { [523,659,784].forEach((f,i)=>this.note(f,"triangle",0.15,0.16,i*0.08)); },
      save:   () => { [523,659,784].forEach((f,i)=>this.note(f,"triangle",0.15,0.16,i*0.08)); },
    };
    if (s[type]) s[type]();
  },

  setVol(v) { this.vol = v; },
};

function levelReward(lvId) {
  if ((lvId+1) % 10 === 0) return 80 + lvId * 3;  // boss
  return 20 + Math.floor(lvId * 1.5);
}

// Kahraman kilit kontrolü
function isHeroUnlocked(hero, best) {
  if (hero.unlockLevel < 0) return true;
  if (hero.price === 0 && hero.unlockLevel === 99) return Object.keys(best).length >= 99;
  return Object.keys(best).some(k => parseInt(k) >= hero.unlockLevel);
}

// Güç efekti çiz
function drawPowerFX(ctx, s, hero, W, H) {
  if (!s.powerActive || !hero) return;
  const t = s.tick, rem = s.powerRem;
  const px = s.px, py = s.py;
  switch(hero.power) {
    case "invisible":
      // Görünmezlik: halka efekti
      ctx.strokeStyle = "rgba(168,85,247,0.4)"; ctx.lineWidth = 2;
      ctx.shadowColor = "#7c3aed"; ctx.shadowBlur = 14;
      ctx.beginPath(); ctx.arc(px-s.camX, py, 40+Math.sin(t*0.15)*6, 0, Math.PI*2); ctx.stroke();
      ctx.shadowBlur = 0; break;
    case "firesword":
      for(let i=0;i<5;i++){
        const fa=(t*0.2+i*1.26)%(Math.PI*2);
        ctx.fillStyle=`hsl(${t*8+i*20},100%,60%)`;
        ctx.shadowColor=ctx.fillStyle; ctx.shadowBlur=10;
        ctx.beginPath(); ctx.arc(px-s.camX+Math.cos(fa)*26, py+Math.sin(fa)*20, 4, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur=0;
      } break;
    case "freeze":
      ctx.strokeStyle="rgba(186,230,253,0.7)"; ctx.lineWidth=2; ctx.shadowColor="#7dd3fc"; ctx.shadowBlur=12;
      for(let r=20;r<70;r+=16){ctx.beginPath();ctx.arc(px-s.camX,py,r+Math.sin(t*0.1+r)*3,0,Math.PI*2);ctx.stroke();}
      ctx.shadowBlur=0; break;
    case "lightning":
      ctx.strokeStyle="#fde047"; ctx.lineWidth=3; ctx.shadowColor="#fde047"; ctx.shadowBlur=20;
      ctx.beginPath(); ctx.moveTo(px-s.camX, py-40); ctx.lineTo(px-s.camX+Math.sin(t*0.3)*8,py-20); ctx.lineTo(px-s.camX,py); ctx.stroke();
      ctx.shadowBlur=0; break;
    case "shield": case "goldshield":
      const sc=hero.power==="goldshield"?"#fbbf24":"#60a5fa";
      ctx.strokeStyle=sc; ctx.lineWidth=4; ctx.shadowColor=sc; ctx.shadowBlur=18;
      ctx.globalAlpha=0.6+Math.sin(t*0.12)*0.25;
      ctx.beginPath(); ctx.arc(px-s.camX, py, 38+Math.sin(t*0.1)*4, 0, Math.PI*2); ctx.stroke();
      ctx.globalAlpha=1; ctx.shadowBlur=0; break;
    case "antigrav":
      ctx.fillStyle="rgba(99,102,241,0.3)"; ctx.shadowColor="#6366f1"; ctx.shadowBlur=12;
      ctx.beginPath(); ctx.arc(px-s.camX, py, 32, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur=0; break;
    case "dash":
      ctx.fillStyle="rgba(99,102,241,0.35)";
      for(let i=1;i<=4;i++) ctx.fillRect(px-s.camX-i*14*s.facing-8, py-14, 12, 28);
      break;
    case "chaos": case "overkill":
      for(let i=0;i<8;i++){
        const ca=(i/8)*Math.PI*2;
        const cr=30+Math.random()*20;
        ctx.fillStyle=`hsl(${t*15+i*45},100%,60%)`;
        ctx.shadowColor=ctx.fillStyle; ctx.shadowBlur=14;
        ctx.beginPath(); ctx.arc(px-s.camX+Math.cos(ca)*cr,py+Math.sin(ca)*cr,5,0,Math.PI*2); ctx.fill();
        ctx.shadowBlur=0;
      } break;
    case "universe":
      ctx.strokeStyle=`hsl(${t*4},80%,65%)`; ctx.lineWidth=3; ctx.shadowColor="white"; ctx.shadowBlur=22;
      ctx.beginPath(); ctx.arc(px-s.camX,py,50+Math.sin(t*0.12)*8,0,Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.arc(px-s.camX,py,32,0,Math.PI*2); ctx.stroke();
      ctx.shadowBlur=0; break;

    default: break;
  }
}

// Kostüm özelliklerini çiz (şapka + göz + efekt)
function drawCostumeExtras(ctx, costume, x, y, bob, tick, dead) {
  if (!costume || dead) return;
  ctx.save(); ctx.translate(x, y);

  // ŞAPKALAR
  const hy = -13 + bob; // head top
  switch(costume.hat) {
    case "leaf":
      ctx.fillStyle = "#16a34a";
      ctx.beginPath(); ctx.ellipse(0, hy-10, 12, 7, -0.3, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle="#15803d"; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(-12,hy-10); ctx.bezierCurveTo(-6,hy-18,6,hy-18,12,hy-10); ctx.stroke();
      break;
    case "cloud":
      ctx.fillStyle="rgba(219,234,254,0.9)";
      ctx.beginPath(); ctx.ellipse(0,hy-8,14,8,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(-7,hy-12,9,7,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(7,hy-12,9,7,0,0,Math.PI*2); ctx.fill();
      break;
    case "chef":
      ctx.fillStyle="#fff";
      ctx.beginPath(); ctx.ellipse(0,hy-14,10,14,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle="#f0f0f0"; ctx.fillRect(-11,hy-6,22,5);
      break;
    case "viking":
      ctx.fillStyle="#92400e";
      ctx.beginPath(); ctx.roundRect(-12,hy-10,24,12,4); ctx.fill();
      ctx.fillStyle="#fbbf24";
      ctx.beginPath(); ctx.moveTo(-14,hy-4); ctx.lineTo(-20,hy+4); ctx.lineTo(-14,hy+2); ctx.fill();
      ctx.beginPath(); ctx.moveTo(14,hy-4); ctx.lineTo(20,hy+4); ctx.lineTo(14,hy+2); ctx.fill();
      break;
    case "astronaut":
      ctx.fillStyle="#e2e8f0"; ctx.shadowColor="#94a3b8"; ctx.shadowBlur=8;
      ctx.beginPath(); ctx.arc(0,hy-6,16,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
      ctx.fillStyle="rgba(147,197,253,0.5)";
      ctx.beginPath(); ctx.ellipse(0,hy-6,10,12,0,0,Math.PI*2); ctx.fill();
      break;
    case "ninja":
      ctx.fillStyle="#1e293b";
      ctx.fillRect(-14,hy-8,28,16);
      ctx.fillRect(-14,hy-2,28,4);
      break;
    case "pirate":
      ctx.fillStyle="#1e293b";
      ctx.beginPath(); ctx.moveTo(-12,hy); ctx.lineTo(-12,hy-14); ctx.lineTo(12,hy-14); ctx.lineTo(12,hy); ctx.fill();
      ctx.fillStyle="#fff"; ctx.fillRect(-6,hy-14,12,2);
      ctx.fillStyle="#f87171"; ctx.fillRect(-6,hy-16,12,3);
      break;
    case "cowboy":
      ctx.fillStyle="#d97706";
      ctx.beginPath(); ctx.ellipse(0,hy-8,10,8,0,0,Math.PI*2); ctx.fill();
      ctx.fillRect(-16,hy-2,32,4);
      break;
    case "wizard":
      ctx.fillStyle="#7c3aed";
      ctx.beginPath(); ctx.moveTo(0,hy-28); ctx.lineTo(-11,hy); ctx.lineTo(11,hy); ctx.closePath(); ctx.fill();
      ctx.strokeStyle="#fde047"; ctx.lineWidth=1.5;
      for(let i=0;i<3;i++){ctx.beginPath();ctx.arc(-4+i*4,hy-8-i*5,2,0,Math.PI*2);ctx.stroke();}
      break;
    case "detective":
      ctx.fillStyle="#374151";
      ctx.fillRect(-12,hy-14,24,14); ctx.fillRect(-16,hy-1,32,3);
      break;
    case "crown":
      ctx.fillStyle="#ffd700"; ctx.shadowColor="#ffd700"; ctx.shadowBlur=10;
      ctx.beginPath();
      ctx.moveTo(-12,hy); ctx.lineTo(-12,hy-12); ctx.lineTo(-6,hy-7); ctx.lineTo(0,hy-14);
      ctx.lineTo(6,hy-7); ctx.lineTo(12,hy-12); ctx.lineTo(12,hy); ctx.closePath(); ctx.fill();
      ctx.shadowBlur=0;
      break;
    case "antenna":
      ctx.strokeStyle="#94a3b8"; ctx.lineWidth=2.5;
      ctx.beginPath(); ctx.moveTo(0,hy); ctx.lineTo(0,hy-16); ctx.stroke();
      ctx.fillStyle="#ef4444"; ctx.shadowColor="#ef4444"; ctx.shadowBlur=8;
      ctx.beginPath(); ctx.arc(0,hy-16,4,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
      break;
    case "horns":
      ctx.fillStyle="#dc2626";
      for(let s2=-1;s2<=1;s2+=2){ctx.beginPath();ctx.moveTo(s2*6,hy);ctx.lineTo(s2*10,hy-18);ctx.lineTo(s2*2,hy-8);ctx.fill();}
      break;
    case "lightning":
      ctx.fillStyle="#fde047"; ctx.shadowColor="#fde047"; ctx.shadowBlur=12;
      ctx.beginPath(); ctx.moveTo(0,hy-22); ctx.lineTo(-6,hy-10); ctx.lineTo(3,hy-10); ctx.lineTo(-3,hy); ctx.lineTo(6,hy-12); ctx.lineTo(-3,hy-12); ctx.lineTo(3,hy-22); ctx.fill();
      ctx.shadowBlur=0; break;
    case "goldcrown":
      ctx.fillStyle="#ffd700"; ctx.shadowColor="#ffd700"; ctx.shadowBlur=16;
      ctx.beginPath();
      ctx.moveTo(-14,hy); ctx.lineTo(-14,hy-14); ctx.lineTo(-7,hy-9); ctx.lineTo(0,hy-18);
      ctx.lineTo(7,hy-9); ctx.lineTo(14,hy-14); ctx.lineTo(14,hy); ctx.closePath(); ctx.fill();
      ctx.fillStyle="#ef4444"; ctx.beginPath(); ctx.arc(0,hy-16,3,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0; break;
    case "snowflake":
      ctx.strokeStyle="#bae6fd"; ctx.lineWidth=2.5; ctx.shadowColor="#bae6fd"; ctx.shadowBlur=8;
      for(let a=0;a<6;a++){ctx.save();ctx.translate(0,hy-12);ctx.rotate(a*Math.PI/3);ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-10);ctx.stroke();ctx.restore();}
      ctx.shadowBlur=0; break;
    case "bunny":
      ctx.fillStyle="#fce7f3";
      for(let s2=-1;s2<=1;s2+=2){ctx.beginPath();ctx.ellipse(s2*7,hy-18,4,11,s2*0.2,0,Math.PI*2);ctx.fill();}
      ctx.fillStyle="#fbcfe8";
      for(let s2=-1;s2<=1;s2+=2){ctx.beginPath();ctx.ellipse(s2*7,hy-18,2,7,s2*0.2,0,Math.PI*2);ctx.fill();}
      break;
    case "catears":
      ctx.fillStyle="#fde68a";
      for(let s2=-1;s2<=1;s2+=2){ctx.beginPath();ctx.moveTo(s2*4,hy);ctx.lineTo(s2*12,hy-16);ctx.lineTo(s2*16,hy);ctx.fill();}
      break;
    case "froghead":
      ctx.fillStyle="#4ade80";
      ctx.beginPath(); ctx.arc(0,hy-10,14,0,Math.PI*2); ctx.fill();
      ctx.fillStyle="#86efac"; ctx.beginPath(); ctx.arc(-6,hy-14,5,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(6,hy-14,5,0,Math.PI*2); ctx.fill();
      break;
    case "penguin":
      ctx.fillStyle="#1e293b"; ctx.beginPath(); ctx.arc(0,hy-10,13,0,Math.PI*2); ctx.fill();
      ctx.fillStyle="#f8fafc"; ctx.beginPath(); ctx.ellipse(0,hy-8,8,10,0,0,Math.PI*2); ctx.fill();
      break;
    case "strawberry":
      ctx.fillStyle="#f43f5e"; ctx.beginPath(); ctx.arc(0,hy-10,12,0,Math.PI*2); ctx.fill();
      ctx.fillStyle="#16a34a"; ctx.beginPath();
      ctx.moveTo(-4,hy-18); ctx.lineTo(0,hy-26); ctx.lineTo(4,hy-18); ctx.fill();
      ctx.fillStyle="rgba(255,255,255,0.4)"; ctx.font="9px sans-serif"; ctx.textAlign="center";
      ctx.fillText("·",- 4,hy-8); ctx.fillText("·",4,hy-8); ctx.fillText("·",0,hy-4);
      break;
    case "candy":
      ctx.strokeStyle="#f43f5e"; ctx.lineWidth=5; ctx.lineCap="round";
      ctx.beginPath(); ctx.arc(4,hy-14,8,-Math.PI*0.5,Math.PI*0.8); ctx.stroke();
      ctx.strokeStyle="#fde047"; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(4,hy-14,8,-Math.PI*0.5,Math.PI*0.8); ctx.stroke();
      break;
    case "spacehelmet":
      ctx.fillStyle="#334155"; ctx.shadowColor="#60a5fa"; ctx.shadowBlur=10;
      ctx.beginPath(); ctx.arc(0,hy-8,16,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
      ctx.fillStyle="rgba(96,165,250,0.55)"; ctx.beginPath(); ctx.arc(0,hy-8,11,0,Math.PI*2); ctx.fill();
      break;
    case "vampcape":
      ctx.fillStyle="#4c0519"; ctx.beginPath(); ctx.moveTo(-14,hy); ctx.lineTo(-18,hy+20); ctx.lineTo(18,hy+20); ctx.lineTo(14,hy); ctx.fill();
      ctx.fillStyle="#9f1239";
      for(let s2=-1;s2<=1;s2+=2){ctx.beginPath();ctx.moveTo(s2*3,hy-4);ctx.lineTo(s2*6,hy-12);ctx.lineTo(s2*0,hy-8);ctx.fill();}
      break;
    case "dinosaur":
      ctx.fillStyle="#16a34a"; ctx.beginPath(); ctx.arc(0,hy-8,15,0,Math.PI*2); ctx.fill();
      ctx.fillStyle="#15803d";
      for(let i=-1;i<=1;i++){ctx.beginPath();ctx.moveTo(i*6,hy-22);ctx.lineTo(i*4,hy-14);ctx.lineTo(i*10,hy-14);ctx.fill();}
      ctx.fillStyle="#fff"; ctx.beginPath(); ctx.arc(-6,hy-6,3,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(6,hy-6,3,0,Math.PI*2); ctx.fill();
      break;
    default: break;
  }

  // ÖZEL EFEKTLERi (parçacık tarzı, hafif)
  if(costume.special) {
    ctx.globalAlpha = 0.55;
    switch(costume.special) {
      case "flames":
        for(let i=0;i<3;i++){
          const fx=(i-1)*10, ft=tick*0.18+i*2.1;
          ctx.fillStyle=i%2===0?"#ff4500":"#fbbf24";
          ctx.beginPath(); ctx.arc(fx, 18+bob+Math.sin(ft)*4, 4+Math.sin(ft)*2, 0, Math.PI*2); ctx.fill();
        } break;
      case "electric":
        ctx.strokeStyle="#fde047"; ctx.lineWidth=1.5;
        for(let i=0;i<2;i++){
          const ex=i===0?-14:14, et=tick*0.15+i;
          ctx.beginPath(); ctx.moveTo(ex,bob); ctx.lineTo(ex+Math.sin(et)*6,-6+bob); ctx.stroke();
        } break;
      case "sparkle":
        ctx.fillStyle="#ffd700";
        for(let i=0;i<4;i++){
          const sa=(tick*0.12+i*1.57)%(Math.PI*2);
          ctx.beginPath(); ctx.arc(Math.cos(sa)*18, Math.sin(sa)*16+bob, 2.5, 0, Math.PI*2); ctx.fill();
        } break;
      case "stars":
        ctx.fillStyle="#a78bfa";
        for(let i=0;i<3;i++){
          const sa=(tick*0.08+i*2.1)%(Math.PI*2);
          ctx.beginPath(); ctx.arc(Math.cos(sa)*22, Math.sin(sa)*18+bob, 3, 0, Math.PI*2); ctx.fill();
          ctx.beginPath(); ctx.arc(Math.cos(sa+0.5)*14, Math.sin(sa+0.5)*12+bob, 1.5, 0, Math.PI*2); ctx.fill();
        } break;
      case "rainbow":
        for(let i=0;i<6;i++){
          const ra=(tick*0.1+i*1.05)%(Math.PI*2);
          ctx.fillStyle=`hsl(${i*60},100%,60%)`;
          ctx.beginPath(); ctx.arc(Math.cos(ra)*20, Math.sin(ra)*17+bob, 3, 0, Math.PI*2); ctx.fill();
        } break;
      case "bubbles":
        ctx.fillStyle="rgba(96,165,250,0.5)";
        for(let i=0;i<3;i++){
          const bub=(tick*0.05+i*1.5)%(Math.PI*2);
          const by2 = 20 - ((tick*0.8+i*18)%36);
          ctx.beginPath(); ctx.arc((i-1)*12, by2+bob, 4, 0, Math.PI*2); ctx.fill();
        } break;
      case "universe":
        for(let i=0;i<5;i++){
          const ua=(tick*0.06+i*1.26)%(Math.PI*2);
          ctx.fillStyle=`hsl(${240+i*24},80%,70%)`;
          ctx.beginPath(); ctx.arc(Math.cos(ua)*22, Math.sin(ua)*18+bob, 2.5, 0, Math.PI*2); ctx.fill();
        } break;
    }
    ctx.globalAlpha=1;
  }

  // ÖZEL GÖZLER
  ctx.restore();
}

};

function mkLevel(id) {
  const mi = Math.floor(id / 10), gi = id % 10;
  const isBoss = (id + 1) % 10 === 0 && id > 0;
  const map = MAPS[Math.min(mi, 9)];
  const boss = isBoss ? BDEFS[Math.floor(id / 10)] : null;
  const p = id / 99;
  const isIntro = id < 3;
  return {
    id, isBoss, map, boss,
    name: isBoss ? boss.n : `${map.e} ${map.n} ${gi + 1}`,
    emoji: isBoss ? boss.e : map.e,
    color: isBoss ? boss.c : map.c,
    hasSword: id >= 20 || isBoss,
    minions: id >= 30 ? Math.floor(1 + p * 5) : 0,
    pCnt: isIntro ? 4 : Math.floor(7 + p * 24),
    gMin: isIntro ? 50 : Math.floor(60 + p * 170),
    gMax: isIntro ? 90 : Math.floor(110 + p * 250),
    pwMin: isIntro ? 120 : Math.max(14, Math.floor(145 - p * 125)),
    pwMax: isIntro ? 180 : Math.max(28, Math.floor(210 - p * 170)),
    spd: isIntro ? 0.8 : parseFloat((1.0 + p * 3.9 + (isBoss ? 0.9 : 0)).toFixed(2)),
    obs: isIntro ? 0 : parseFloat(Math.min(0.93, p * 0.88 + (isBoss ? 0.2 : 0)).toFixed(2)),
  };
}
const ALL = Array.from({ length: 100 }, (_, i) => mkLevel(i));
const PCOLS = ["#ff6b6b","#ffd93d","#6bcb77","#4d96ff","#ff6bec","#ff922b","#66d9e8","#ffffff","#f472b6","#a78bfa","#34d399","#fb7185"];

// ══════════════════════════════════════════════════════════
const PMAP = {
  forest:["#4ade80","#166534"], cloud:["#93c5fd","#1e40af"],
  desert:["#fbbf24","#92400e"], pipe:["#fb923c","#7c2d12"],
  ocean:["#22d3ee","#164e63"],  space:["#a78bfa","#4c1d95"],
  lava:["#f87171","#7f1d1d"],   snow:["#bae6fd","#075985"],
  city:["#f472b6","#831843"],   chaos:["#a855f7","#3b0764"],
};

function drawPlatform(ctx, p, mk) {
  const isFinish = p.isFinish;
  const isDanger = p.type === "danger";
  const isArena  = p.type === "arena";
  const [c1, c2] = isFinish ? ["#ffd700","#92400e"] : isDanger ? ["#ef4444","#7f1d1d"] : isArena ? ["#ff2244","#550011"] : (PMAP[mk] || ["#aaa","#555"]);
  const g = ctx.createLinearGradient(p.x, p.y, p.x, p.y + 14);
  g.addColorStop(0, c1); g.addColorStop(1, c2);
  ctx.fillStyle = g;
  ctx.shadowColor = c1;
  ctx.shadowBlur = isDanger ? 14 : isFinish ? 28 : 7;

  ctx.beginPath();
  if (mk === "cloud") {
    ctx.ellipse(p.x + p.w / 2, p.y + 7, p.w / 2, 9, 0, 0, Math.PI * 2);
  } else if (mk === "lava") {
    ctx.moveTo(p.x, p.y + 14);
    for (let i = 0; i <= p.w; i += 12)
      ctx.lineTo(p.x + i, p.y + (i % 24 < 12 ? 0 : 14));
    ctx.lineTo(p.x + p.w, p.y + 14); ctx.closePath();
  } else if (mk === "snow") {
    ctx.moveTo(p.x + 6, p.y); ctx.lineTo(p.x + p.w - 6, p.y);
    ctx.lineTo(p.x + p.w, p.y + 14); ctx.lineTo(p.x, p.y + 14); ctx.closePath();
  } else if (mk === "pipe") {
    const r = 6;
    ctx.moveTo(p.x + r, p.y); ctx.lineTo(p.x + p.w - r, p.y);
    ctx.lineTo(p.x + p.w, p.y + 7); ctx.lineTo(p.x + p.w - r, p.y + 14);
    ctx.lineTo(p.x + r, p.y + 14); ctx.lineTo(p.x, p.y + 7); ctx.closePath();
  } else if (mk === "chaos") {
    ctx.moveTo(p.x, p.y + 14);
    for (let i = 0; i <= p.w; i += 9)
      ctx.lineTo(p.x + i, p.y + (i % 18 < 9 ? 14 : 0));
    ctx.lineTo(p.x + p.w, p.y + 14); ctx.closePath();
  } else {
    const r2 = Math.min(5, p.w / 2);
    ctx.moveTo(p.x + r2, p.y); ctx.lineTo(p.x + p.w - r2, p.y);
    ctx.quadraticCurveTo(p.x + p.w, p.y, p.x + p.w, p.y + r2);
    ctx.lineTo(p.x + p.w, p.y + 14 - r2); ctx.quadraticCurveTo(p.x + p.w, p.y + 14, p.x + p.w - r2, p.y + 14);
    ctx.lineTo(p.x + r2, p.y + 14); ctx.quadraticCurveTo(p.x, p.y + 14, p.x, p.y + 14 - r2);
    ctx.lineTo(p.x, p.y + r2); ctx.quadraticCurveTo(p.x, p.y, p.x + r2, p.y); ctx.closePath();
  }
  ctx.fill(); ctx.shadowBlur = 0;
  if (!isDanger && !isFinish && !isArena) {
    ctx.fillStyle = "rgba(255,255,255,0.15)"; ctx.fillRect(p.x + 5, p.y + 2, p.w - 10, 4);
  }
  if (isFinish) {
    ctx.strokeStyle = "#ffd700"; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(p.x + 55, p.y); ctx.lineTo(p.x + 55, p.y - 68); ctx.stroke();
    ctx.fillStyle = "#ff3333";
    ctx.beginPath(); ctx.moveTo(p.x + 55, p.y - 68); ctx.lineTo(p.x + 96, p.y - 50); ctx.lineTo(p.x + 55, p.y - 32); ctx.fill();
  }
}

// ══════════════════════════════════════════════════════════
// SUKULU BLOB KARAKTERİ
// ══════════════════════════════════════════════════════════
function drawBlob(ctx, x, y, col, dir, tick, ground, dead, sword, slashing, costume) {
  ctx.save(); ctx.translate(x, y);
  if (dir < 0) ctx.scale(-1, 1);
  const bob = ground && !dead ? Math.sin(tick * 0.18) * 2 : 0;
  const sq = ground ? 0 : 0.85;

  // Gölge
  ctx.fillStyle = "rgba(0,0,0,0.22)";
  ctx.beginPath(); ctx.ellipse(0, 24 + bob, 12, 4, 0, 0, Math.PI * 2); ctx.fill();

  // Dış parlama halkası (harita rengine göre değişir)
  ctx.strokeStyle = col + "66"; ctx.lineWidth = 2;
  ctx.shadowColor = col; ctx.shadowBlur = 14;
  ctx.beginPath(); ctx.ellipse(0, 4 + bob, 17, 20, 0, 0, Math.PI * 2); ctx.stroke();
  ctx.shadowBlur = 0;

  // Ana blob gövde
  ctx.fillStyle = col; ctx.shadowColor = col; ctx.shadowBlur = 20;
  ctx.beginPath();
  ctx.moveTo(-13, 14 + bob);
  ctx.bezierCurveTo(-19, 4 + bob, -17 - sq*2, -10 + sq*3, 0, -13 + bob + sq*2);
  ctx.bezierCurveTo(17 + sq*2, -10 + sq*3, 19, 4 + bob, 13, 14 + bob);
  ctx.bezierCurveTo(7, 24 + bob, -7, 24 + bob, -13, 14 + bob);
  ctx.fill(); ctx.shadowBlur = 0;

  // İç parlaklık (renk gradyan)
  const hi = ctx.createRadialGradient(-4, -5 + bob, 1, -4, -5 + bob, 13);
  hi.addColorStop(0, "rgba(255,255,255,0.42)"); hi.addColorStop(1, "transparent");
  ctx.fillStyle = hi;
  ctx.beginPath(); ctx.ellipse(-4, -3 + bob, 9, 11, -0.3, 0, Math.PI * 2); ctx.fill();

  // Gözler (büyük, parlak, sukulu)
  const ey = -3 + bob;
  ctx.fillStyle = dead ? "#ff0000" : "#fff";
  ctx.beginPath(); ctx.ellipse(5.5, ey, 5, 5.5, 0.15, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(-5.5, ey, 5, 5.5, -0.15, 0, Math.PI * 2); ctx.fill();
  // Göz bebekleri
  ctx.fillStyle = dead ? "#660000" : "#1a1a2e";
  ctx.beginPath(); ctx.ellipse(6, ey, 3, 3.5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(-5, ey, 3, 3.5, 0, 0, Math.PI * 2); ctx.fill();
  // Göz parlaması
  ctx.fillStyle = "#fff";
  ctx.beginPath(); ctx.arc(7.2, ey - 1.3, 1.3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(-3.8, ey - 1.3, 1.3, 0, Math.PI * 2); ctx.fill();

  // Ağız (duruma göre)
  ctx.strokeStyle = "#1a1a2e"; ctx.lineWidth = 1.8;
  ctx.beginPath();
  dead ? ctx.arc(0, 9 + bob, 5, Math.PI + 0.4, Math.PI * 2 - 0.4)
       : ctx.arc(0, 8 + bob, 4, 0.35, Math.PI - 0.35);
  ctx.stroke();

  // Yanaklar (sevimli)
  if (!dead) {
    ctx.fillStyle = col + "55";
    ctx.beginPath(); ctx.ellipse(-10, 6 + bob, 5, 3.5, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(10, 6 + bob, 5, 3.5, 0, 0, Math.PI * 2); ctx.fill();
  }

  // Bacaklar
  const ls = ground && !dead ? Math.sin(tick * 0.22) * 7 : 0;
  ctx.strokeStyle = col; ctx.lineWidth = 3.5; ctx.lineCap = "round";
  ctx.beginPath(); ctx.moveTo(-5, 16 + bob); ctx.lineTo(-7 + ls, 28 + bob); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(5, 16 + bob); ctx.lineTo(7 - ls, 28 + bob); ctx.stroke();

  // Kollar
  const as = Math.sin(tick * 0.22 + 1) * 9;
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(-11, 2 + bob); ctx.lineTo(-18, 10 + as + bob); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(11, 2 + bob); ctx.lineTo(18, 10 - as + bob); ctx.stroke();

  // KILIC
  if (sword || (costume && costume.sword)) {
    const sa = slashing ? Math.sin(tick * 0.5) * 2.2 - 0.6 : 0.25;
    ctx.save(); ctx.translate(18, 0 + bob); ctx.rotate(sa);
    ctx.fillStyle = "#8B4513";
    ctx.beginPath(); ctx.roundRect(-3, -4, 6, 10, 2); ctx.fill();
    ctx.fillStyle = "#DAA520";
    ctx.beginPath(); ctx.roundRect(-9, -3, 18, 5, 2); ctx.fill();
    ctx.fillStyle = slashing ? "#fffde7" : "#d0d0d0";
    ctx.shadowColor = slashing ? "#fff176" : "#888"; ctx.shadowBlur = slashing ? 18 : 5;
    ctx.beginPath();
    ctx.moveTo(-2, -4); ctx.lineTo(2, -4); ctx.lineTo(1, -28); ctx.lineTo(-1, -28); ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = slashing ? "rgba(255,255,200,0.8)" : "rgba(200,200,200,0.4)";
    ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(0, -5); ctx.lineTo(0, -26); ctx.stroke();
    ctx.shadowBlur = 0;
    if (slashing) {
      ctx.strokeStyle = "rgba(255,255,150,0.65)"; ctx.lineWidth = 3.5;
      ctx.beginPath(); ctx.arc(0, -14, 26, -1.1, 0.5); ctx.stroke();
      ctx.strokeStyle = "rgba(255,255,255,0.3)"; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(0, -14, 32, -0.9, 0.3); ctx.stroke();
    }
    ctx.restore();
  }
  ctx.restore();
  // Kostüm ekstraları (şapka, efekt)
  if (costume && !dead) drawCostumeExtras(ctx, costume, x, y, bob, tick, dead);
}

// ══════════════════════════════════════════════════════════
// MİNYON ÇİZİMİ (küçük sukulu düşman)
// ══════════════════════════════════════════════════════════
function drawMinion(ctx, m, tick) {
  if (m.hp <= 0) return;
  ctx.save(); ctx.translate(m.x, m.y);
  if (m.dir < 0) ctx.scale(-1, 1);
  const bob = Math.sin(tick * 0.25 + m.id * 1.3) * 1.5;

  ctx.fillStyle = m.col; ctx.shadowColor = m.col; ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.moveTo(-8, 9 + bob);
  ctx.bezierCurveTo(-12, 1 + bob, -11, -6 + bob, 0, -9 + bob);
  ctx.bezierCurveTo(11, -6 + bob, 12, 1 + bob, 8, 9 + bob);
  ctx.bezierCurveTo(5, 14 + bob, -5, 14 + bob, -8, 9 + bob);
  ctx.fill(); ctx.shadowBlur = 0;

  // Gözler
  ctx.fillStyle = "#fff";
  ctx.beginPath(); ctx.ellipse(3, -1 + bob, 3, 3.5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(-3, -1 + bob, 3, 3.5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = "#111";
  ctx.beginPath(); ctx.ellipse(3.5, -1 + bob, 1.8, 2, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(-2.5, -1 + bob, 1.8, 2, 0, 0, Math.PI * 2); ctx.fill();

  // HP bar
  ctx.fillStyle = "#ef4444"; ctx.fillRect(-12, -18, 24, 4);
  ctx.fillStyle = "#4ade80"; ctx.fillRect(-12, -18, 24 * m.hp, 4);

  ctx.restore();
}

// ══════════════════════════════════════════════════════════
// BOSS ÇİZİMİ (devasa, her boss benzersiz)
// ══════════════════════════════════════════════════════════
function drawBoss(ctx, b, tick) {
  if (b.hp <= 0) return;
  const def = BDEFS[b.defId];
  const sz = def.sz;
  const bob = Math.sin(tick * 0.09) * 8;
  const phase = b.hp / def.hp;
  const hue2 = phase > 0.5 ? 140 : phase > 0.25 ? 40 : 0;
  ctx.save(); ctx.translate(b.x, b.y + bob);

  // Aura
  const ag = ctx.createRadialGradient(0, 0, sz*0.2, 0, 0, sz*1.4);
  ag.addColorStop(0, def.c + "33"); ag.addColorStop(1, "transparent");
  ctx.fillStyle = ag; ctx.beginPath(); ctx.arc(0, 0, sz*1.4, 0, Math.PI*2); ctx.fill();

  // Hit flash
  if (b.hitFlash > 0) {
    ctx.fillStyle = `rgba(255,255,255,${b.hitFlash/14})`;
    ctx.beginPath(); ctx.arc(0, 0, sz*0.92, 0, Math.PI*2); ctx.fill();
  }

  // Haritaya özgü boss şekli
  ctx.fillStyle = def.c; ctx.shadowColor = def.c; ctx.shadowBlur = 32;
  const sh = def.shape;

  if (sh === "cloud") {
    // Bulut: üç daire birleşimi
    ctx.beginPath(); ctx.arc(0, sz*0.1, sz*0.6, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(-sz*0.5, sz*0.25, sz*0.42, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(sz*0.5, sz*0.25, sz*0.42, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(-sz*0.28, -sz*0.18, sz*0.38, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(sz*0.28, -sz*0.18, sz*0.38, 0, Math.PI*2); ctx.fill();
  } else if (sh === "desert") {
    // Çöl: sekizgen kaya
    ctx.beginPath();
    for (let i=0;i<8;i++){const a=(i/8)*Math.PI*2-Math.PI/8;const r=sz*(0.75+0.1*(i%2));ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);}
    ctx.closePath(); ctx.fill();
  } else if (sh === "pipe") {
    // Fabrika: hexagon robot
    ctx.beginPath();
    for (let i=0;i<6;i++){const a=(i/6)*Math.PI*2;ctx.lineTo(Math.cos(a)*sz*0.8,Math.sin(a)*sz*0.8);}
    ctx.closePath(); ctx.fill();
    // Robot parçaları
    ctx.fillStyle = "#64748b";
    ctx.fillRect(-sz*0.25, -sz*0.6, sz*0.5, sz*0.2);
    ctx.fillRect(-sz*0.35, sz*0.4, sz*0.22, sz*0.25);
    ctx.fillRect(sz*0.13, sz*0.4, sz*0.22, sz*0.25);
  } else if (sh === "ocean") {
    // Okyanus: dalgalı şekil
    ctx.beginPath();
    for (let i=0;i<60;i++){const a=(i/60)*Math.PI*2;const wave=1+0.2*Math.sin(a*4+tick*0.08);ctx.lineTo(Math.cos(a)*sz*0.78*wave,Math.sin(a)*sz*0.78*wave);}
    ctx.closePath(); ctx.fill();
  } else if (sh === "space") {
    // Uzay: yıldız şekli
    ctx.beginPath();
    for (let i=0;i<10;i++){const a=(i/10)*Math.PI*2-Math.PI/2;const r=i%2===0?sz*0.82:sz*0.42;ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);}
    ctx.closePath(); ctx.fill();
  } else if (sh === "lava") {
    // Lava: titreyen blob
    ctx.beginPath();
    for (let i=0;i<60;i++){const a=(i/60)*Math.PI*2;const n=1+0.18*Math.sin(a*3+tick*0.12)+0.1*Math.cos(a*5-tick*0.08);ctx.lineTo(Math.cos(a)*sz*0.78*n,Math.sin(a)*sz*0.78*n);}
    ctx.closePath(); ctx.fill();
  } else if (sh === "snow") {
    // Kar: kristal/elmas
    ctx.beginPath();
    for (let i=0;i<12;i++){const a=(i/12)*Math.PI*2;const r=i%2===0?sz*0.82:sz*0.55;ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);}
    ctx.closePath(); ctx.fill();
  } else if (sh === "city") {
    // Neon: kalp + geometrik
    ctx.beginPath();
    for (let i=0;i<60;i++){const a=(i/60)*Math.PI*2;const heart=sz*0.7*(Math.pow(Math.sin(a),3));const hx2=16*Math.pow(Math.sin(a),3)*sz*0.045;const hy2=-(13*Math.cos(a)-5*Math.cos(2*a)-2*Math.cos(3*a)-Math.cos(4*a))*sz*0.045;ctx.lineTo(hx2,hy2);}
    ctx.closePath(); ctx.fill();
  } else if (sh === "chaos") {
    // Kaos: karmaşık multi-şekil
    ctx.beginPath();
    for (let i=0;i<80;i++){const a=(i/80)*Math.PI*2;const chaos2=1+0.25*Math.sin(a*7+tick*0.05)+0.15*Math.cos(a*11-tick*0.07)+0.1*Math.sin(a*13);ctx.lineTo(Math.cos(a)*sz*0.72*chaos2,Math.sin(a)*sz*0.72*chaos2);}
    ctx.closePath(); ctx.fill();
  } else {
    // Forest (default): yuvarlak ama organik
    ctx.beginPath();
    for (let i=0;i<60;i++){const a=(i/60)*Math.PI*2;const n=1+0.12*Math.cos(a*3)+0.08*Math.sin(a*5);ctx.lineTo(Math.cos(a)*sz*0.8*n,Math.sin(a)*sz*0.8*n);}
    ctx.closePath(); ctx.fill();
  }
  ctx.shadowBlur = 0;

  // İç parlaklık
  const ig = ctx.createRadialGradient(-sz*0.18, -sz*0.22, sz*0.04, -sz*0.18, -sz*0.22, sz*0.48);
  ig.addColorStop(0, "rgba(255,255,255,0.24)"); ig.addColorStop(1, "transparent");
  ctx.fillStyle = ig; ctx.beginPath(); ctx.ellipse(-sz*0.18, -sz*0.22, sz*0.42, sz*0.52, 0, 0, Math.PI*2); ctx.fill();

  // Haritaya özgü aksesuarlar
  if (sh === "forest") {
    ctx.fillStyle = "#15803d";
    for (let s2=-1;s2<=1;s2+=2){ctx.beginPath();ctx.ellipse(s2*sz*0.38,-sz*0.62,sz*0.13,sz*0.34,s2*0.4,0,Math.PI*2);ctx.fill();}
  } else if (sh === "cloud") {
    ctx.strokeStyle="#fde047"; ctx.lineWidth=sz*0.048;
    for (let s2=-1;s2<=1;s2+=2){ctx.beginPath();ctx.moveTo(s2*sz*0.3,-sz*0.55);ctx.lineTo(s2*sz*0.17,-sz*0.8);ctx.lineTo(s2*sz*0.34,-sz*0.82);ctx.lineTo(s2*sz*0.19,-sz*1.06);ctx.stroke();}
  } else if (sh === "space") {
    ctx.strokeStyle = def.c; ctx.lineWidth = sz*0.07;
    ctx.beginPath(); ctx.ellipse(0, 0, sz*1.12, sz*0.28, 0.12, 0, Math.PI*2); ctx.stroke();
  } else if (sh === "chaos") {
    ctx.fillStyle = "#6d28d9";
    for (let i=0;i<5;i++){const ang=-Math.PI*0.9+i*(Math.PI*0.45);ctx.beginPath();ctx.moveTo(Math.cos(ang)*sz*0.55,Math.sin(ang)*sz*0.55);ctx.lineTo(Math.cos(ang-0.16)*sz*0.98,Math.sin(ang-0.16)*sz*0.98);ctx.lineTo(Math.cos(ang+0.16)*sz*0.98,Math.sin(ang+0.16)*sz*0.98);ctx.closePath();ctx.fill();}
    ctx.strokeStyle=`hsl(${tick*3},100%,60%)`; ctx.lineWidth=sz*0.03;
    ctx.beginPath(); ctx.arc(0,0,sz*0.72,0,Math.PI*2); ctx.stroke();
  } else {
    ctx.fillStyle = def.c + "cc";
    ctx.beginPath(); ctx.moveTo(-sz*0.28,-sz*0.55); ctx.lineTo(-sz*0.38,-sz*0.96); ctx.lineTo(-sz*0.13,-sz*0.62); ctx.fill();
    ctx.beginPath(); ctx.moveTo(sz*0.28,-sz*0.55); ctx.lineTo(sz*0.38,-sz*0.96); ctx.lineTo(sz*0.13,-sz*0.62); ctx.fill();
  }

  // Yanaklar
  ctx.fillStyle = def.c + "88";
  ctx.beginPath(); ctx.ellipse(-sz*0.38, sz*0.05, sz*0.14, sz*0.09, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(sz*0.38, sz*0.05, sz*0.14, sz*0.09, 0, 0, Math.PI*2); ctx.fill();

  // Gözler
  const eyX = Math.sin(tick*0.06)*sz*0.05;
  ctx.fillStyle = "#ffff00"; ctx.shadowColor = "#ff0"; ctx.shadowBlur = 16;
  ctx.beginPath(); ctx.ellipse(-sz*0.23+eyX,-sz*0.19,sz*0.155,sz*0.19,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(sz*0.23+eyX,-sz*0.19,sz*0.155,sz*0.19,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = "#000"; ctx.shadowBlur = 0;
  ctx.beginPath(); ctx.ellipse(-sz*0.23+eyX,-sz*0.19,sz*0.088,sz*0.105,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(sz*0.23+eyX,-sz*0.19,sz*0.088,sz*0.105,0,0,Math.PI*2); ctx.fill();

  // Ağız + dişler
  ctx.strokeStyle="#440000"; ctx.lineWidth=sz*0.046;
  ctx.beginPath(); ctx.arc(0,sz*0.12,sz*0.3,0.28,Math.PI-0.28); ctx.stroke();
  ctx.fillStyle="#fff";
  for (let i=-2;i<=2;i++){ctx.beginPath();ctx.moveTo(i*sz*0.1,sz*0.32);ctx.lineTo(i*sz*0.1-sz*0.055,sz*0.49);ctx.lineTo(i*sz*0.1+sz*0.055,sz*0.49);ctx.fill();}

  // HP bar
  const bw=sz*2.5, bh=18;
  ctx.fillStyle="rgba(0,0,0,0.78)"; ctx.beginPath(); ctx.roundRect(-bw/2,-sz-54,bw,bh,8); ctx.fill();
  const hcol=phase>0.6?"#4ade80":phase>0.3?"#fbbf24":"#ef4444";
  ctx.fillStyle=hcol; ctx.shadowColor=hcol; ctx.shadowBlur=14;
  if (phase>0){ctx.beginPath();ctx.roundRect(-bw/2,-sz-54,bw*phase,bh,8);ctx.fill();}
  ctx.shadowBlur=0;
  ctx.fillStyle="#fff"; ctx.textAlign="center";
  ctx.font=`bold ${Math.floor(sz*0.155)}px 'Courier New'`;
  ctx.fillText(`${def.e} ${def.n}`,0,-sz-58);
  ctx.font=`${Math.floor(sz*0.12)}px 'Courier New'`;
  ctx.fillText(`HP ${b.hp}/${def.hp}  |  ${def.ab}`,0,-sz-38);
  ctx.textAlign="left";
  // Özel güç aktif efekti
  if (b.specialActive > 0) {
    const sa = b.specialActive/90;
    ctx.save(); ctx.translate(b.x, b.y + bob);
    ctx.strokeStyle = def.c; ctx.lineWidth = 5*sa; ctx.shadowColor = def.c; ctx.shadowBlur = 28*sa;
    ctx.globalAlpha = sa*0.8;
    ctx.beginPath(); ctx.arc(0, 0, def.sz*1.15+Math.sin(b.specialActive*0.2)*10, 0, Math.PI*2); ctx.stroke();
    ctx.globalAlpha = 1; ctx.shadowBlur = 0;
    ctx.fillStyle = "#fff"; ctx.font = "bold 13px 'Courier New'"; ctx.textAlign = "center";
    ctx.fillText(def.specialDesc, 0, -def.sz*1.35);
    ctx.textAlign = "left";
    ctx.restore();
  }
  ctx.restore();
}


// ══════════════════════════════════════════════════════════
// ARKA PLAN
// ══════════════════════════════════════════════════════════
function drawBg(ctx, W, H, map, camX, tick) {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, map.bg[0]); g.addColorStop(0.6, map.bg[1]); g.addColorStop(1, map.bg[2]);
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

  if (map.k === "space" || map.k === "chaos") {
    for (let i = 0; i < 100; i++) {
      const sx = ((i*137.5+camX*0.17)%(W+40))-20, sy = (i*79.3)%(H*0.92);
      const fl = 0.35+0.65*Math.sin(tick*0.04+i*1.7);
      ctx.fillStyle = map.k === "chaos" ? `hsla(${i*37+tick*2},100%,70%,${fl*0.65})` : `rgba(255,255,255,${fl*0.7})`;
      ctx.beginPath(); ctx.arc(sx, sy, i%5===0?2.2:i%3===0?1.1:0.55, 0, Math.PI*2); ctx.fill();
    }
  }
  if (map.k === "forest") {
    ctx.fillStyle = "rgba(74,222,128,0.07)";
    for (let i = 0; i < 8; i++) {
      const tx = ((i*210-camX*0.07)%(W+320))-110;
      ctx.beginPath(); ctx.moveTo(tx, H); ctx.lineTo(tx+80, H*0.38); ctx.lineTo(tx+160, H); ctx.fill();
    }
  }
  if (map.k === "cloud") {
    for (let i = 0; i < 6; i++) {
      const cx = ((i*230-camX*0.05)%(W+350))-120, cy = H*0.18+i*38;
      ctx.fillStyle = `rgba(147,197,253,${0.07+i*0.018})`;
      ctx.beginPath(); ctx.ellipse(cx, cy, 100, 38, 0, 0, Math.PI*2); ctx.fill();
    }
  }
  if (map.k === "ocean") {
    for (let i = 0; i < 5; i++) {
      ctx.strokeStyle = `rgba(34,211,238,${0.05+i*0.024})`; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(0, H*0.27+i*28);
      for (let wx = 0; wx < W; wx += 60)
        ctx.quadraticCurveTo(wx+30, H*0.27+i*28-13+Math.sin(wx*0.04+tick*0.022+i)*13, wx+60, H*0.27+i*28);
      ctx.stroke();
    }
  }
  if (map.k === "snow") {
    for (let i = 0; i < 45; i++) {
      const sx = ((i*94+camX*0.11+tick*0.44)%(W+22))-11, sy = ((i*67+tick*0.98)%H);
      ctx.fillStyle = `rgba(186,230,253,${0.22+0.38*(i%3===0?1:0)})`;
      ctx.beginPath(); ctx.arc(sx, sy, i%4===0?4:1.8, 0, Math.PI*2); ctx.fill();
    }
  }
  if (map.k === "lava") {
    const lg = ctx.createLinearGradient(0, H*0.66, 0, H);
    lg.addColorStop(0, `rgba(239,68,68,${0.13+0.09*Math.sin(tick*0.04)})`); lg.addColorStop(1, "transparent");
    ctx.fillStyle = lg; ctx.fillRect(0, H*0.66, W, H*0.34);
    for (let i = 0; i < 12; i++) {
      const bx = ((i*148-camX*0.09+tick*0.58)%(W+110))-55;
      const by = H-18+Math.sin(tick*0.08+i*0.78)*9;
      ctx.fillStyle = `rgba(255,${58+i*17},0,0.62)`;
      ctx.beginPath(); ctx.arc(bx, by, 5+i%4*3, 0, Math.PI*2); ctx.fill();
    }
  }
  if (map.k === "city") {
    for (let i = 0; i < 9; i++) {
      const bx = ((i*152-camX*0.06)%(W+220))-110, bh = 62+i*30;
      ctx.fillStyle = "rgba(244,114,182,0.08)"; ctx.strokeStyle = "rgba(244,114,182,0.16)"; ctx.lineWidth = 1;
      ctx.fillRect(bx, H-bh, 44, bh); ctx.strokeRect(bx, H-bh, 44, bh);
      ctx.fillStyle = `rgba(255,255,0,${0.2+0.22*Math.sin(tick*0.05+i)})`;
      for (let wy = H-bh+10; wy < H-8; wy += 15)
        for (let wx2 = bx+6; wx2 < bx+38; wx2 += 13) ctx.fillRect(wx2, wy, 7, 7);
    }
    // Neon tabelalar
    ctx.strokeStyle = `hsl(${tick*2},100%,60%)`; ctx.lineWidth = 2;
    for (let i = 0; i < 4; i++) {
      const nx = ((i*280-camX*0.1)%(W+300))-100;
      ctx.beginPath(); ctx.arc(nx, H*0.35+i*30, 15, 0, Math.PI*2); ctx.stroke();
    }
  }
  if (map.k === "desert") {
    for (let i = 0; i < 5; i++) {
      const sx = ((i*220-camX*0.05+tick*0.2)%(W+320))-160;
      ctx.fillStyle = "rgba(251,191,36,0.05)";
      ctx.beginPath(); ctx.ellipse(sx, H*0.5, 135, 48, 0, 0, Math.PI*2); ctx.fill();
    }
  }
  if (map.k === "pipe") {
    ctx.strokeStyle = "rgba(251,146,60,0.08)"; ctx.lineWidth = 8;
    for (let i = 0; i < 4; i++) {
      const px2 = ((i*280-camX*0.04)%(W+300))-100;
      ctx.beginPath(); ctx.moveTo(px2, 0); ctx.lineTo(px2, H); ctx.stroke();
    }
  }
}

// ══════════════════════════════════════════════════════════
// PLATFORM ÜRETICI (seeded random - her bölüm farklı layout)
// ══════════════════════════════════════════════════════════
function genLevel(lv, W, H) {
  const wireY = H * 0.57;
  const plats = [], obs = [];

  // ── BOSS BÖLÜMÜ: tek geniş düz zemin, bitiş dahil ──────────────
  if (lv.isBoss) {
    const arenaW = W * 3.4;
    // Arena + bitiş birleşik — boşluk yok, düşme imkansız
    plats.push({ x: 0, y: wireY, w: arenaW, h: 14, type: "arena" });
    // Bitiş platformu arenaya yapışık (gap=0)
    plats.push({ x: arenaW, y: wireY, w: 260, h: 14, type: "finish", isFinish: true });
    return { plats, obs, totalW: arenaW + 260, wireY };
  }

  // ── NORMAL BÖLÜM: parkur ─────────────────────────────────────────
  plats.push({ x: 0, y: wireY, w: 230, h: 14, type: "start" });
  let x = 270;
  let seed = lv.id * 7919 + 1337;
  const rng = () => { seed = (seed * 1664525 + 1013904223) & 0x7fffffff; return seed / 0x7fffffff; };

  for (let i = 0; i < lv.pCnt; i++) {
    const gap = lv.gMin + rng() * (lv.gMax - lv.gMin);
    const pw  = lv.pwMin + rng() * (lv.pwMax - lv.pwMin);
    const yo  = (rng() - 0.5) * 74;
    const hasO = i > 1 && rng() < lv.obs;
    plats.push({ x, y: wireY + yo, w: pw, h: 14, type: hasO ? "danger" : "normal" });
    if (hasO) obs.push({
      x: x+pw/2, bx: x+pw/2, y: wireY+yo-22, w: 14, h: 20,
      t: rng()*Math.PI*2, range: 22+rng()*44, spd: (0.5+rng()*1.6)*lv.spd*0.32,
    });
    x += pw + gap;
  }
  plats.push({ x, y: wireY, w: 270, h: 14, type: "finish", isFinish: true });
  return { plats, obs, totalW: x+270, wireY };
}

// ══════════════════════════════════════════════════════════
// OYUN SAHNE
// ══════════════════════════════════════════════════════════
function Game({ lv, col, btnSz, cfg, activeCostume, activeHero, onWin, onDie, onBack, onSettings }) {
  const cvs   = useRef(null);
  const sRef  = useRef(null);
  const raf   = useRef(null);
  const keys  = useRef({});
  const touch = useRef({ left: false, right: false });
  const jFlag = useRef(false);
  const aFlag = useRef(false);
  const pFlag = useRef(false); // güç tuşu
  const W = window.innerWidth, H = window.innerHeight;

  useEffect(() => {
    AudioMgr.init(); AudioMgr.startMusic(lv.isBoss && lv.boss ? `boss${lv.boss.id}` : lv.map.k);
    const canvas = cvs.current;
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext("2d");
    const { plats, obs, totalW, wireY } = genLevel(lv, W, H);
    const arenaP = plats.find(p => p.type === "arena");
    const def = lv.boss ? BDEFS[lv.boss.id] : null;
    const boss = lv.isBoss && arenaP ? {
      defId: lv.boss.id,
      x: W * 0.55,
      y: arenaP.y - def.sz * 0.74,
      baseY: arenaP.y - def.sz * 0.74,
      hp: def.hp, vx: def.ms,
      arena: { x: 80, w: W * 2.6 },
      proj: [], shootCd: def.cd, hitFlash: 0,
      specialCd: def.specialCd || 999, specialActive: 0,
    } : null;

    // Minyonlar
    const MCOLS = ["#ff6b6b","#ffd93d","#6bcb77","#ff6bec","#66d9e8","#f472b6"];
    const minions = [];
    if (lv.minions > 0) {
      for (let i = 0; i < lv.minions; i++) {
        const pidx = Math.floor(1 + Math.random() * Math.max(1, plats.length - 3));
        const p = plats[Math.min(pidx, plats.length - 2)];
        minions.push({
          id: i, x: p.x + p.w*0.5, y: p.y - 28,
          vx: (Math.random()>0.5?1:-1)*(0.9+Math.random()*1.4)*lv.spd*0.45,
          vy: 0, hp: 1, dir: 1, col: MCOLS[i%MCOLS.length],
          pL: p.x + 10, pR: p.x + p.w - 10, onGround: false,
        });
      }
    }

    sRef.current = {
      px: 115, py: wireY-52, vx: 0, vy: 0,
      onGround: false, camX: 0, tick: 0, facing: 1,
      plats, obs, totalW, wireY, boss, minions,
      dead: false, finished: false, deathTick: 0,
      progress: 0, shake: 0, slashTick: 0, atkCd: 0,
      lives: lv.isBoss ? 3 : 1, livesFlash: 0,
      powerActive: false, powerRem: 0, powerCd: 0,
      shieldHits: 0, reborn: false,
      jumpsLeft: 2, dashCd: 0, dashActive: 0, dashDir: 1,
      combo: 0, comboTimer: 0, bestCombo: 0, speedTimer: 0,
    };

    const loop = () => {
      const s = sRef.current; if (!s) return;
      s.tick++;

      if (!s.dead && !s.finished) {
        const L = keys.current["ArrowLeft"]  || keys.current["a"] || touch.current.left;
        const R = keys.current["ArrowRight"] || keys.current["d"] || touch.current.right;
        const J = jFlag.current || keys.current[" "] || keys.current["ArrowUp"] || keys.current["w"];
        const A = aFlag.current || keys.current["x"] || keys.current["f"];
        jFlag.current = false; aFlag.current = false;

        if (L) { s.vx = -4.5*lv.spd; s.facing = -1; }
        else if (R) { s.vx = 4.5*lv.spd; s.facing = 1; }
        else s.vx *= 0.76;

        if (J && s.jumpsLeft > 0) {
          s.vy = s.jumpsLeft === 2 ? -13 : -10; // İkinci zıplama biraz daha az
          if (!s.onGround) s.jumpsLeft = Math.max(0, s.jumpsLeft - 1);
          else s.jumpsLeft = 1; // Yerden zıplayınca 1 hak kalır
          s.onGround = false;
          AudioMgr.sfx("jump");
          // İkinci zıplama efekti
          if (s.jumpsLeft === 0) s.doubleJumpFx = 12;
        }
        if (s.onGround) s.jumpsLeft = 2; // Yere basınca reset
        if (s.doubleJumpFx > 0) s.doubleJumpFx--;

        // DASH (çift ◀/▶ veya D tuşu + yön)
        const dashKey = keys.current["e"] || keys.current["E"];
        if (dashKey && s.dashCd <= 0 && !s.dashActive) {
          s.dashActive = 12; s.dashDir = s.facing; s.dashCd = 45;
          AudioMgr.sfx("slash");
        }
        if (s.dashActive > 0) {
          s.vx = s.dashDir * 14; s.dashActive--;
          // Dash sırasında engellere çarpmaz
        }
        if (s.dashCd > 0) s.dashCd--;
        // Combo timer
        if (s.comboTimer > 0) { s.comboTimer--; }
        else if (s.combo > 0) { s.combo = 0; }
        s.speedTimer++;
        if (lv.map.k === "snow" && s.onGround) s.vx *= 0.97;

        // Kılıç saldırısı
        // Özel güç aktive
        const P = pFlag.current || keys.current["q"];
        pFlag.current = false;
        if (P && activeHero && s.powerCd <= 0 && !s.powerActive) {
          s.powerActive = true;
          s.powerRem = activeHero.dur;
          s.powerCd = activeHero.cd;
          s.shieldHits = 3;
          AudioMgr.sfx("unlock");
          // Anlık güçler
          if (activeHero.power === "lightning" && boss && boss.hp > 0) {
            const dmg = activeHero.bossDmg;
            boss.hp = Math.max(0, boss.hp - dmg);
            boss.hitFlash = 16; s.shake = 18;
            if (boss.hp <= 0) { boss.proj = []; s.shake = 28; AudioMgr.sfx("win"); }
          }
          if ((activeHero.power === "chaos" || activeHero.power === "overkill") && boss && boss.hp > 0) {
            const dmg2 = Math.min(activeHero.bossDmg, boss.hp);
            boss.hp = Math.max(0, boss.hp - dmg2);
            boss.hitFlash = 20; s.shake = 22;
            if (boss.hp <= 0) { boss.proj = []; s.shake = 30; AudioMgr.sfx("win"); }
          }
          if (activeHero.power === "firebreath") {
            for (const m of s.minions) m.hp = 0;
          }
        }
        if (s.powerActive) {
          s.powerRem--;
          if (s.powerRem <= 0) s.powerActive = false;
          // Dondur: boss sabit
          if (activeHero && activeHero.power === "freeze" && boss) {
            boss.vx = 0;
          }
          // Yavaşlat: boss ve mermiler
          if (activeHero && activeHero.power === "slowtime" && boss) {
            boss.vx *= 0.3;
            if (s.tick % 3 !== 0 && boss.proj) boss.proj.forEach(p2 => { p2.vx *= 0.3; p2.vy *= 0.3; });
          }
          // Karanlık: boss ateş etmez
          if (activeHero && activeHero.power === "darkness" && boss) {
            boss.shootCd = Math.max(boss.shootCd, 60);
          }
          // Yer çekimsiz: yukarı uç
          if (activeHero && activeHero.power === "antigrav") {
            s.vy = Math.min(s.vy, -0.5);
            s.onGround = false;
          }
          // Tornado: mermileri sav
          if (activeHero && activeHero.power === "tornado" && boss && boss.proj) {
            boss.proj.forEach(p2 => {
              const ang2 = Math.atan2(p2.y - s.py, p2.x - s.px);
              p2.vx = Math.cos(ang2 + Math.PI) * 5;
              p2.vy = Math.sin(ang2 + Math.PI) * 5;
            });
          }
          // Lazer duvarı: mermileri durdur
          if (activeHero && activeHero.power === "laserwall" && boss && boss.proj) {
            if (s.tick % 5 === 0) boss.proj = boss.proj.filter(p2 => Math.abs(p2.x - s.px) > 80);
          }
          // Gökkuşağı: mermileri zararsız yap
          if (activeHero && activeHero.power === "rainbow" && boss && boss.proj) {
            boss.proj.forEach(p2 => { p2.harmless = true; });
          }
          // Thorns: gelen mermiyi geri gönder
          if (activeHero && activeHero.power === "thorns" && boss && boss.proj) {
            boss.proj.forEach(p2 => {
              if (Math.abs(p2.x - s.px) < 30 && Math.abs(p2.y - s.py) < 30) {
                p2.vx *= -1.5; p2.vy *= -1.5; p2.friendly = true;
              }
            });
          }
          // Lava havuzu: boss sürekli hasar
          if (activeHero && activeHero.power === "lavapool" && boss && boss.hp > 0 && s.tick % 60 === 0) {
            boss.hp = Math.max(0, boss.hp - 1);
            boss.hitFlash = 8;
            if (boss.hp <= 0) { boss.proj = []; AudioMgr.sfx("win"); }
          }
          // Dalga: boss'u iter
          if (activeHero && activeHero.power === "wave" && boss) {
            boss.x += (boss.x > s.px ? 8 : -8);
          }
          // Karadelik: boss'u çek
          if (activeHero && activeHero.power === "blackhole" && boss) {
            const bdx = s.px - boss.x;
            boss.x += bdx * 0.08;
            boss.vx *= 0.1;
          }

        }
        if (s.powerCd > 0) s.powerCd--;

        if (A && s.atkCd <= 0 && lv.hasSword) {
          s.slashTick = 22; s.atkCd = 24; AudioMgr.sfx("slash");
          // Minyonlara vur
          for (const m of s.minions) {
            if (m.hp > 0 && Math.abs(s.px-m.x) < 60 && Math.abs(s.py-m.y) < 42 &&
                ((s.facing === 1 && m.x > s.px) || (s.facing === -1 && m.x < s.px))) {
              m.hp = 0; AudioMgr.sfx("hit");
              s.combo++; s.comboTimer = 120;
              if (s.combo > s.bestCombo) s.bestCombo = s.combo;
            }
          }
          // Boss'a kılıç
          if (boss && boss.hp > 0 && def) {
            if (Math.abs(s.px-boss.x) < def.sz*0.65+58 && Math.abs(s.py-boss.y) < def.sz*0.72 &&
                ((s.facing===1 && boss.x>s.px)||(s.facing===-1 && boss.x<s.px))) {
              const isLastBoss = def && def.id === 9; // Kaos Tanrısı = 10. boss
              const baseDmg = isLastBoss ? 5 : 1;   // 10. boss: 1 kılıç = 5 hasar
              const sdmg = activeHero && s.powerActive ? Math.max(baseDmg, activeHero.swordDmg) : baseDmg;
              boss.hp = Math.max(0, boss.hp - sdmg); boss.hitFlash = 12; s.shake = 11; AudioMgr.sfx("hit");
              s.combo += sdmg; s.comboTimer = 150;
              if (s.combo > s.bestCombo) s.bestCombo = s.combo;
              if (boss.hp <= 0) { boss.proj = []; s.shake = 26; AudioMgr.sfx("win"); }
            }
          }
        }
        if (s.atkCd > 0) s.atkCd--;
        if (s.slashTick > 0) s.slashTick--;

        s.vy += 0.50; s.px += s.vx; s.py += s.vy;
        if (s.px < 14) { s.px = 14; s.vx = 0; }

        // Platform çarpışma
        s.onGround = false;
        for (const p of s.plats) {
          if (s.px+14 < p.x || s.px-14 > p.x+p.w) continue;
          const foot = s.py+28, prev = foot-s.vy;
          if (prev <= p.y+5 && foot >= p.y && s.vy >= 0) {
            s.py = p.y-28; s.vy = 0; s.onGround = true;
            if (p.isFinish && s.px > p.x+38 && (!boss || boss.hp <= 0)) {
              s.finished = true; s.finishTime = s.tick;
              AudioMgr.sfx("win"); setTimeout(onWin, 500);
            }
          }
        }

        // Engeller
        for (const o of s.obs) {
          o.t += 0.05*lv.spd; o.x = o.bx + Math.sin(o.t)*o.range;
          if (Math.abs(s.px-o.x)<16 && Math.abs(s.py-o.y+10)<22) {
            const inv2 = activeHero && s.powerActive && (activeHero.power==="invisible"||activeHero.power==="goldshield"||activeHero.power==="immortal");
            if (!inv2) {
              if (lv.isBoss && s.lives > 1) { s.lives--; s.livesFlash=60; s.py=s.wireY-52; s.px=115; s.vy=-8; s.vx=0; AudioMgr.sfx("die"); }
              else { s.dead=true; AudioMgr.sfx("die"); }
            }
          }
        }

        // Minyonlar
        for (const m of minions) {
          if (m.hp <= 0) continue;
          m.vy += 0.50; m.x += m.vx; m.y += m.vy; m.dir = m.vx > 0 ? 1 : -1;
          m.onGround = false;
          for (const p of s.plats) {
            if (m.x+9 < p.x || m.x-9 > p.x+p.w) continue;
            const foot = m.y+18, prev = foot-m.vy;
            if (prev <= p.y+5 && foot >= p.y && m.vy >= 0) { m.y = p.y-18; m.vy = 0; m.onGround = true; }
          }
          if (m.x < m.pL || m.x > m.pR) m.vx *= -1;
          if (m.y > H+110) m.hp = 0;
          if (Math.abs(s.px-m.x) < 22 && Math.abs(s.py-m.y) < 32) {
            const inv3 = activeHero && s.powerActive && (activeHero.power==="invisible"||activeHero.power==="goldshield"||activeHero.power==="immortal");
            if (!inv3) {
              if (lv.isBoss && s.lives > 1) { s.lives--; s.livesFlash=60; s.py=s.wireY-52; s.px=115; s.vy=-8; s.vx=0; AudioMgr.sfx("die"); }
              else { s.dead=true; AudioMgr.sfx("die"); }
            }
          }
        }

        // Boss
        if (boss && boss.hp > 0) {
          boss.hitFlash = Math.max(0, boss.hitFlash-1);
          boss.shootCd--;
          boss.x += boss.vx * (1+(def.hp-boss.hp)*0.24);
          if (boss.x > boss.arena.x+boss.arena.w-def.sz*0.66) boss.vx = -Math.abs(boss.vx);
          if (boss.x < boss.arena.x+def.sz*0.66) boss.vx = Math.abs(boss.vx);
          boss.y = boss.baseY + Math.sin(s.tick*0.09)*25;

          // Boss özel güç
          boss.specialCd--;
          if (boss.specialCd <= 0) {
            boss.specialCd = def.specialCd || 999;
            boss.specialActive = 90; // 1.5 sn görsel efekt
            const sp = def.special;
            if (sp === "heal" && boss.hp < def.hp) {
              boss.hp = Math.min(def.hp, boss.hp + 1);
              boss.hitFlash = 8;
            }
            if (sp === "storm") {
              for (let a=0; a<4; a++) {
                const ang = a*(Math.PI/2)+s.tick*0.1;
                boss.proj.push({ x:boss.x, y:boss.y, vx:Math.cos(ang)*6, vy:Math.sin(ang)*6, life:120, c:"#fde047" });
              }
            }
            if (sp === "sandwall") {
              for (let i=-2; i<=2; i++)
                boss.proj.push({ x:boss.x+i*40, y:boss.y, vx:0, vy:3, life:100, c:"#fbbf24" });
            }
            if (sp === "overdrive") { boss.vx *= 1.8; boss.specialActive = 120; }
            if (sp === "tsunami") {
              for (let i=0; i<5; i++)
                boss.proj.push({ x:boss.x-100+i*50, y:boss.y, vx:(s.px>boss.x?1:-1)*4, vy:0, life:130, c:"#22d3ee" });
            }
            if (sp === "gravity") {
              s.px += (boss.x-s.px)*0.18; s.py += (boss.y-s.py)*0.18;
              s.shake = 14;
            }
            if (sp === "eruption") {
              for (let i=0; i<8; i++) {
                const ang2 = (i/8)*Math.PI*2;
                boss.proj.push({ x:boss.x, y:boss.y, vx:Math.cos(ang2)*5, vy:Math.sin(ang2)*5-3, life:140, c:"#ef4444" });
              }
            }
            if (sp === "blizzard") {
              s.vx *= 0.2; s.shake = 10;
              for (let i=-1; i<=1; i++)
                boss.proj.push({ x:boss.x+i*60, y:boss.y, vx:(s.px>boss.x?2:-2)+i, vy:2, life:110, c:"#bae6fd" });
            }
            if (sp === "laserrain") {
              for (let i=0; i<6; i++)
                boss.proj.push({ x:boss.arena.x+i*(W*2.6/5), y:boss.y-80, vx:0, vy:6, life:100, c:"#ec4899" });
            }
            if (sp === "chaos") {
              for (let a=0; a<8; a++) {
                const ang3 = (a/8)*Math.PI*2+s.tick*0.05;
                boss.proj.push({ x:boss.x, y:boss.y, vx:Math.cos(ang3)*5, vy:Math.sin(ang3)*5, life:160, c:`hsl(${a*45},100%,60%)` });
              }
              boss.vx *= 1.4; s.shake = 16;
            }
            AudioMgr.sfx("boss");
          }
          if (boss.specialActive > 0) {
            boss.specialActive--;
            if (def.special === "overdrive" && boss.specialActive <= 0) boss.vx /= 1.8;
          }

          if (boss.shootCd <= 0) {
            const dx = s.px-boss.x, dy = s.py-boss.y;
            const dist = Math.sqrt(dx*dx+dy*dy)||1;
            const spd = 3.8+(def.hp-boss.hp)*1.4;
            if (def.st === "chaos") {
              for (let a = 0; a < 6; a++) {
                const ang = (a/6)*Math.PI*2+s.tick*0.05;
                boss.proj.push({ x:boss.x, y:boss.y, vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd, life:175, c:def.c });
              }
            } else if (def.st === "laser") {
              for (let o2 = -24; o2 <= 24; o2 += 24)
                boss.proj.push({ x:boss.x+o2, y:boss.y, vx:dx/dist*spd, vy:dy/dist*spd, life:155, c:def.c });
            } else if (def.st === "wave") {
              for (let a = -0.35; a <= 0.35; a += 0.35) {
                const ca = Math.cos(a), sa2 = Math.sin(a);
                boss.proj.push({ x:boss.x, y:boss.y, vx:(dx/dist*spd)*ca-(dy/dist*spd)*sa2, vy:(dx/dist*spd)*sa2+(dy/dist*spd)*ca, life:145, c:def.c });
              }
            } else {
              boss.proj.push({ x:boss.x, y:boss.y, vx:dx/dist*spd, vy:dy/dist*spd, life:165, c:def.c });
            }
            boss.shootCd = Math.max(16, def.cd-(def.hp-boss.hp)*7);
          }

          boss.proj = boss.proj.filter(pr => {
            pr.x += pr.vx; pr.y += pr.vy; pr.life--;
            if (def.st === "black") { s.px += (pr.x-s.px)*0.007; s.py += (pr.y-s.py)*0.007; }
            if (pr.life <= 0) return false;
            if (pr.harmless) return pr.life > 0;
            if (Math.abs(s.px-pr.x)<18 && Math.abs(s.py-pr.y)<18) {
              const invulnerable = activeHero && s.powerActive && (activeHero.power==="invisible"||activeHero.power==="goldshield"||activeHero.power==="immortal");
              if (invulnerable) return false;
              const shielded = activeHero && s.powerActive && (activeHero.power==="shield") && s.shieldHits > 0;
              if (shielded) { s.shieldHits--; s.shake=6; return false; }
              const lifesteal = activeHero && s.powerActive && activeHero.power==="lifesteal";
              if (lifesteal) { s.shake=4; return false; }

              if (lv.isBoss && s.lives > 1) {
                s.lives--; s.livesFlash = 60; s.py = s.wireY-52; s.px = 115; s.vy = -8; s.vx = 0;
                s.powerActive = false; s.dead = false; AudioMgr.sfx("die");
              } else { s.dead=true; AudioMgr.sfx("die"); }
              return false;
            }
            return true;
          });

          // Boss'a değersen ölürsün — sadece kılıçla yenilir!
          if (Math.abs(s.px-boss.x) < def.sz*0.54 && Math.abs(s.py-boss.y) < def.sz*0.62) {
            const inv4 = activeHero && s.powerActive && (activeHero.power==="invisible"||activeHero.power==="goldshield"||activeHero.power==="immortal");
            if (!inv4) {
              if (s.lives > 1) { s.lives--; s.livesFlash=60; s.py=s.wireY-52; s.px=115; s.vy=-8; s.vx=0; AudioMgr.sfx("die"); }
              else { s.dead=true; AudioMgr.sfx("die"); }
            }
          }
        }

        s.camX = Math.max(0, Math.min(s.totalW-W, s.px-W*0.33));
        s.progress = Math.min(1, (s.px-115)/(s.totalW-400));
        if (s.py > H+150) {
{ s.dead=true; AudioMgr.sfx("die"); }
        }
        if (s.dead) s.deathTick = 0;
      }

      if (s.dead) { s.deathTick++; if (s.deathTick > 95) { onDie(); return; } }
      if (s.shake > 0) s.shake--;

      // ─── ÇİZİM
      ctx.clearRect(0, 0, W, H);
      drawBg(ctx, W, H, lv.map, s.camX, s.tick);

      ctx.save();
      if (s.shake > 0 && cfg && cfg.screenShake !== false) ctx.translate((Math.random()-0.5)*s.shake*0.72, (Math.random()-0.5)*s.shake*0.72);
      // Can kaybı kırmızı flash
      if (s.livesFlash > 40) {
        ctx.fillStyle = `rgba(255,0,0,${(s.livesFlash-40)/60*0.35})`;
        ctx.fillRect(0,0,W,H);
      }
      ctx.translate(-s.camX, 0);

      // Tel
      ctx.strokeStyle = lv.map.w; ctx.lineWidth = 2.5;
      ctx.shadowColor = lv.map.w; ctx.shadowBlur = 12;
      ctx.beginPath(); ctx.moveTo(0, s.wireY); ctx.lineTo(s.totalW, s.wireY); ctx.stroke();
      ctx.shadowBlur = 0;

      // Platform
      for (const p of s.plats) {
        if (p.x-s.camX > W+200 || p.x+p.w-s.camX < -200) continue;
        drawPlatform(ctx, p, lv.map.k);
        // Tutorial etiketleri
        if (lv.isTutorial && p.label) {
          ctx.fillStyle="rgba(255,255,255,0.9)"; ctx.font="bold 12px 'Courier New'"; ctx.textAlign="center";
          ctx.shadowColor="#4ade80"; ctx.shadowBlur=8;
          ctx.fillText(p.label, p.x+p.w/2, p.y-14); ctx.textAlign="left"; ctx.shadowBlur=0;
        }
                if (p.isFinish && lv.isBoss && boss && boss.hp > 0) {
          ctx.fillStyle = "rgba(255,50,50,0.85)"; ctx.font = "bold 13px 'Courier New'"; ctx.textAlign = "center";
          ctx.fillText("👹 BOSS'U YEN!", p.x+p.w/2, p.y-10); ctx.textAlign = "left";
        }
      }

      // Engeller
      for (const o of s.obs) {
        if (Math.abs(o.x-(s.camX+W/2)) > W+80) continue;
        ctx.fillStyle = "#ff2222"; ctx.shadowColor = "#ff0000"; ctx.shadowBlur = 18;
        ctx.beginPath(); ctx.moveTo(o.x, o.y-o.h); ctx.lineTo(o.x-o.w/2, o.y); ctx.lineTo(o.x+o.w/2, o.y); ctx.closePath();
        ctx.fill(); ctx.shadowBlur = 0;
      }

      // Minyonlar
      for (const m of minions) {
        if (m.hp <= 0 || Math.abs(m.x-s.camX-W/2) > W+60) continue;
        drawMinion(ctx, m, s.tick);
      }

      // Boss + mermiler
      if (boss) {
        drawBoss(ctx, boss, s.tick);
        for (const pr of boss.proj) {
          if (Math.abs(pr.x-s.camX-W/2) > W+90) continue;
          const pg = ctx.createRadialGradient(pr.x, pr.y, 1, pr.x, pr.y, 10);
          pg.addColorStop(0, "#fff"); pg.addColorStop(0.5, pr.c); pg.addColorStop(1, "transparent");
          ctx.fillStyle = pg; ctx.shadowColor = pr.c; ctx.shadowBlur = 16;
          ctx.beginPath(); ctx.arc(pr.x, pr.y, 9, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0;
        }
      }

      // Dash izi efekti
      if (s.dashActive > 0) {
        for (let di = 1; di <= 3; di++) {
          ctx.globalAlpha = 0.2 * (1 - di/4);
          ctx.fillStyle = getCostumeColor(activeCostume, col);
          ctx.beginPath(); ctx.ellipse(s.px - s.camX - s.dashDir*di*18, s.py, 12, 16, 0, 0, Math.PI*2); ctx.fill();
        }
        ctx.globalAlpha = 1;
      }
      // Çift zıplama efekti
      if (s.doubleJumpFx > 0) {
        ctx.strokeStyle = getCostumeColor(activeCostume, col);
        ctx.lineWidth = 2; ctx.globalAlpha = s.doubleJumpFx/12;
        ctx.shadowColor = getCostumeColor(activeCostume, col); ctx.shadowBlur = 12;
        ctx.beginPath(); ctx.arc(s.px-s.camX, s.py, 28+( 12-s.doubleJumpFx)*3, 0, Math.PI*2); ctx.stroke();
        ctx.globalAlpha = 1; ctx.shadowBlur = 0;
      }

      // Karakter
      if (!s.dead) {
        if (activeHero && s.powerActive && activeHero.power==="invisible") ctx.globalAlpha=0.30;

        drawBlob(ctx, s.px, s.py, getCostumeColor(activeCostume, col), s.facing, s.tick, s.onGround, false, lv.hasSword, s.slashTick > 0, activeCostume);
        ctx.globalAlpha=1; ctx.shadowBlur=0;
      } else {
        ctx.globalAlpha = Math.max(0, 1-s.deathTick/28);
        ctx.save(); ctx.translate(s.px, s.py-s.deathTick*2.8); ctx.rotate(s.deathTick*0.07);
        drawBlob(ctx, 0, 0, getCostumeColor(activeCostume, col), s.facing, s.tick, false, true, false, false, null); ctx.restore();
        ctx.globalAlpha = 1;
        for (let i = 0; i < 12 && s.deathTick < 26; i++) {
          const a=(i/12)*Math.PI*2, d=s.deathTick*3.9;
          ctx.globalAlpha = Math.max(0,1-s.deathTick/26); ctx.fillStyle = col;
          ctx.beginPath(); ctx.arc(s.px+Math.cos(a)*d, s.py+Math.sin(a)*d, 4.5, 0, Math.PI*2); ctx.fill();
        }
        ctx.globalAlpha = 1;
      }
      // Güç efekti
      if (activeHero && s.powerActive) drawPowerFX(ctx, s, activeHero, W, H);
      ctx.restore();

      // HUD
      ctx.fillStyle = "rgba(0,0,0,0.65)"; ctx.beginPath(); ctx.roundRect(W/2-140,8,280,14,7); ctx.fill();
      ctx.fillStyle = lv.isBoss ? "#ff2244" : lv.map.c; ctx.shadowColor = ctx.fillStyle; ctx.shadowBlur = 18;
      if (s.progress > 0) { ctx.beginPath(); ctx.roundRect(W/2-140,8,280*Math.max(0,s.progress),14,7); ctx.fill(); }
      ctx.shadowBlur = 0;
      ctx.font="16px serif"; ctx.fillText("🚀",W/2-158,24); ctx.fillText("🏁",W/2+142,24);

      ctx.fillStyle="rgba(0,0,0,0.68)"; ctx.beginPath(); ctx.roundRect(W/2-95,26,190,25,8); ctx.fill();
      ctx.fillStyle=lv.isBoss?"#ff4466":lv.map.c; ctx.font="bold 12px 'Courier New'"; ctx.textAlign="center";
      ctx.fillText(`${lv.emoji} ${lv.name}`,W/2,43); ctx.textAlign="left";

      ctx.fillStyle="rgba(0,0,0,0.65)"; ctx.beginPath(); ctx.roundRect(W-76,8,66,26,7); ctx.fill();
      ctx.fillStyle="rgba(255,255,255,0.78)"; ctx.font="bold 11px 'Courier New'";
      ctx.fillText(`${lv.id+1}/100`,W-70,25);
      // Can göstergesi (boss bölümünde)
      if (lv.isBoss) {
        ctx.fillStyle="rgba(0,0,0,0.65)"; ctx.beginPath(); ctx.roundRect(W/2-55,H-44,110,28,8); ctx.fill();
        ctx.font="18px serif"; ctx.textAlign="center";
        const heartsStr = (s.lives>=3?"❤️":"🖤")+(s.lives>=2?"❤️":"🖤")+(s.lives>=1?"❤️":"🖤");
        ctx.fillText(heartsStr, W/2, H-22);
        ctx.textAlign="left";
        if (s.livesFlash > 0) { s.livesFlash--; }
      }

      if (lv.isBoss && boss && boss.hp > 0) {
        ctx.fillStyle="rgba(0,0,0,0.72)"; ctx.beginPath(); ctx.roundRect(W/2-118,56,236,32,9); ctx.fill();
        ctx.fillStyle="#ff4466"; ctx.font="bold 11px 'Courier New'"; ctx.textAlign="center";
        ctx.fillText(`${BDEFS[boss.defId].e} ${BDEFS[boss.defId].n}`,W/2,69);
        const bsDef=BDEFS[boss.defId]; const bscdPct=Math.max(0,1-boss.specialCd/(bsDef.specialCd||999));
        ctx.fillStyle="rgba(255,255,255,0.08)"; ctx.beginPath(); ctx.roundRect(W/2-98,76,196,5,2); ctx.fill();
        ctx.fillStyle=bscdPct>=0.95?"#ff4466":"rgba(255,100,100,0.4)";
        ctx.beginPath(); ctx.roundRect(W/2-98,76,196*bscdPct,5,2); ctx.fill();
        ctx.fillStyle="rgba(255,180,180,0.6)"; ctx.font="8px 'Courier New'"; ctx.textAlign="center";
        ctx.fillText(`⚡ ${bsDef.specialDesc||""}`,W/2,89);
        const hc2 = boss.hp/def.hp>0.6?"#4ade80":boss.hp/def.hp>0.3?"#fbbf24":"#ef4444";
        ctx.fillStyle="rgba(255,255,255,0.12)"; ctx.beginPath(); ctx.roundRect(W/2-98,72,196,9,4); ctx.fill();
        ctx.fillStyle=hc2; ctx.shadowColor=hc2; ctx.shadowBlur=10;
        ctx.beginPath(); ctx.roundRect(W/2-98,72,196*(boss.hp/def.hp),9,4); ctx.fill(); ctx.shadowBlur=0;
        ctx.textAlign="left";
      }

      ctx.fillStyle="rgba(0,0,0,0.68)"; ctx.beginPath(); ctx.roundRect(10,8,74,28,7); ctx.fill();
      ctx.fillStyle="rgba(255,255,255,0.72)"; ctx.font="11px 'Courier New'"; ctx.fillText("← GERİ",16,26);
      // Ayarlar butonu (sağ üst)
      ctx.fillStyle="rgba(0,0,0,0.68)"; ctx.beginPath(); ctx.roundRect(W-74,38,64,26,7); ctx.fill();
      ctx.fillStyle="rgba(255,255,255,0.6)"; ctx.font="10px 'Courier New'"; ctx.fillText("⚙️ AYAR",W-68,55);

      // Çift zıplama göstergesi (sol üst, alt köşe)
      for (let ji=0; ji<2; ji++) {
        const jc = ji < s.jumpsLeft ? getCostumeColor(activeCostume,col) : "rgba(255,255,255,0.2)";
        ctx.fillStyle = jc; ctx.shadowColor = jc; ctx.shadowBlur = ji < s.jumpsLeft ? 8 : 0;
        ctx.beginPath(); ctx.roundRect(10+(ji*26), H-36, 20, 12, 4); ctx.fill();
        ctx.shadowBlur = 0;
      }
      // Dash göstergesi
      const dPct = s.dashCd <= 0 ? 1 : 1-s.dashCd/45;
      ctx.fillStyle = "rgba(255,255,255,0.15)"; ctx.beginPath(); ctx.roundRect(64, H-36, 40, 12, 4); ctx.fill();
      ctx.fillStyle = dPct>=1?"#60a5fa":"rgba(96,165,250,0.4)"; ctx.shadowColor="#60a5fa"; ctx.shadowBlur = dPct>=1?8:0;
      ctx.beginPath(); ctx.roundRect(64, H-36, 40*dPct, 12, 4); ctx.fill(); ctx.shadowBlur=0;
      ctx.fillStyle="rgba(255,255,255,0.5)"; ctx.font="8px 'Courier New'"; ctx.fillText("E=DASH",66,H-27);

      // Combo gösterge
      if (s.combo > 0) {
        ctx.fillStyle="rgba(0,0,0,0.6)"; ctx.beginPath(); ctx.roundRect(W/2-55,56,110,28,8); ctx.fill();
        ctx.fillStyle=`hsl(${s.combo*12},100%,65%)`; ctx.shadowColor=ctx.fillStyle; ctx.shadowBlur=12;
        ctx.font="bold 14px 'Fredoka One',sans-serif"; ctx.textAlign="center";
        ctx.fillText(`🔥 x${s.combo} COMBO`,W/2,75); ctx.textAlign="left"; ctx.shadowBlur=0;
      }
      // Süre
      const secs = Math.floor(s.tick/60), mins = Math.floor(secs/60);
      const timeStr = `${mins}:${String(secs%60).padStart(2,"0")}`;
      ctx.fillStyle="rgba(0,0,0,0.5)"; ctx.beginPath(); ctx.roundRect(W/2-30,H-38,60,18,5); ctx.fill();
      ctx.fillStyle="rgba(255,255,255,0.5)"; ctx.font="10px 'Courier New'"; ctx.textAlign="center";
      ctx.fillText(timeStr,W/2,H-25); ctx.textAlign="left";

      if (lv.hasSword) {
        ctx.fillStyle="rgba(0,0,0,0.62)"; ctx.beginPath(); ctx.roundRect(10,H-56,165,30,7); ctx.fill();
        ctx.fillStyle=s.atkCd>0?"#888":"#fde047"; ctx.font="11px 'Courier New'";
        ctx.fillText(`⚔️ Kılıç${s.atkCd>0?" ("+s.atkCd+")":"✓"} | Zıpla/Vur`,16,H-36);
      }
      // Güç göstergesi
      if (activeHero) {
        const pwY = lv.hasSword ? H-92 : H-56;
        ctx.fillStyle="rgba(0,0,0,0.65)"; ctx.beginPath(); ctx.roundRect(10,pwY-4,200,36,8); ctx.fill();
        const pReady = s.powerCd<=0 && !s.powerActive;
        const pColor = s.powerActive ? activeHero.glow : pReady ? "#4ade80" : "#666";
        ctx.fillStyle=pColor; ctx.shadowColor=pColor; ctx.shadowBlur=pReady?10:0;
        ctx.font="bold 11px 'Courier New'";
        const pLabel = s.powerActive ? `${activeHero.powerEmoji} ${activeHero.powerName}! (${Math.ceil(s.powerRem/60)}s)` : pReady ? `${activeHero.powerEmoji} Q = ${activeHero.powerName}` : `${activeHero.powerEmoji} CD: ${Math.ceil(s.powerCd/60)}s`;
        ctx.fillText(pLabel,16,pwY+14);
        ctx.shadowBlur=0;
        // CD bar
        const cdPct = s.powerActive ? s.powerRem/activeHero.dur : s.powerCd>0 ? 1-s.powerCd/activeHero.cd : 1;
        ctx.fillStyle="rgba(255,255,255,0.1)"; ctx.fillRect(10,pwY+20,200,5);
        ctx.fillStyle=s.powerActive?activeHero.glow:"#4ade80"; ctx.fillRect(10,pwY+20,200*Math.max(0,Math.min(1,cdPct)),5);
      }

      raf.current = requestAnimationFrame(loop);
    };

    raf.current = requestAnimationFrame(loop);
    return () => { cancelAnimationFrame(raf.current); AudioMgr.stopMusic(); };
  }, []);

  useEffect(() => {
    const kd = e => {
      keys.current[e.key] = true;
      if ([" ","ArrowUp","ArrowLeft","ArrowRight","w","a","d","x","f","q"].includes(e.key)) e.preventDefault();
    };
    const ku = e => { keys.current[e.key] = false; };
    window.addEventListener("keydown", kd); window.addEventListener("keyup", ku);
    return () => { window.removeEventListener("keydown", kd); window.removeEventListener("keyup", ku); };
  }, []);

  const handleTap = useCallback(e => {
    const x = e.clientX ?? e.changedTouches?.[0]?.clientX;
    const y = e.clientY ?? e.changedTouches?.[0]?.clientY;
    if (x < 90 && y < 46) { AudioMgr.stopMusic(); onBack(); }
    // Ayarlar butonu
    if (x > W-80 && y > 36 && y < 68) { onSettings(); }
  }, [onBack, onSettings, W]);

  const bs = btnSz || 68;
  return (
    <div style={{ position:"fixed",inset:0,touchAction:"none" }}>
      <canvas ref={cvs} style={{ display:"block" }} onClick={handleTap} onTouchEnd={handleTap}/>
      <div style={{ position:"fixed",bottom:0,left:0,right:0,display:"flex",justifyContent:"space-between",alignItems:"flex-end",padding:`0 18px ${Math.max(24,bs*0.3)}px`,pointerEvents:"none" }}>
        {/* SOL: Hareket tuşları */}
        <div style={{ display:"flex",gap:10,pointerEvents:"all",alignItems:"flex-end" }}>
          <GB sz={bs} label="◀" onS={()=>touch.current.left=true}  onE={()=>touch.current.left=false}/>
          <GB sz={bs} label="▶" onS={()=>touch.current.right=true} onE={()=>touch.current.right=false}/>
          <GB sz={Math.floor(bs*0.78)} label="💨" col="rgba(96,165,250,0.25)"
            onS={()=>{ keys.current["e"]=true; }} onE={()=>{ keys.current["e"]=false; }}/>
        </div>
        {/* SAĞ: Zıplama + Kılıç yan yana (başparmak ulaşır) + Güç üstte */}
        <div style={{ display:"flex",flexDirection:"column",gap:10,pointerEvents:"all",alignItems:"flex-end" }}>
          {activeHero && (
            <div style={{ alignSelf:"center" }}>
              <GB sz={Math.floor(bs*0.72)} label={activeHero.powerEmoji}
                col={`rgba(${activeHero.glow.replace('#','').match(/.{2}/g).map(x=>parseInt(x,16)).join(',')},0.28)`}
                onS={()=>{pFlag.current=true;}} onE={()=>{}}/>
            </div>
          )}
          <div style={{ display:"flex",gap:10,alignItems:"flex-end" }}>
            {lv.hasSword && (
              <GB sz={Math.floor(bs*1.05)} label="⚔️"
                col="rgba(253,224,71,0.25)"
                big
                onS={()=>{aFlag.current=true;}} onE={()=>{}}/>
            )}
            <GB sz={Math.floor(bs*1.18)} label="↑"
              col="rgba(99,102,241,0.28)" big
              onS={()=>{jFlag.current=true;}} onE={()=>{}}/>
          </div>
        </div>
      </div>
    </div>
  );
}

function GB({ sz, label, onS, onE, col, big }) {
  return (
    <button
      onTouchStart={e=>{e.preventDefault();onS();}}
      onTouchEnd={e=>{e.preventDefault();onE();}}
      onMouseDown={onS} onMouseUp={onE}
      style={{ width:sz,height:sz,background:col||"rgba(255,255,255,0.13)",border:"2.5px solid rgba(255,255,255,0.34)",borderRadius:"50%",color:"#fff",fontSize:big?sz*0.42:sz*0.38,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",WebkitTapHighlightColor:"transparent",userSelect:"none",backdropFilter:"blur(8px)",touchAction:"none",pointerEvents:"all",fontWeight:"bold",boxShadow:big?"0 4px 22px rgba(99,102,241,0.45)":"0 2px 12px rgba(0,0,0,0.35)",flexShrink:0 }}>
      {label}
    </button>
  );
}

// BLOB ÖNİZLEME
// ══════════════════════════════════════════════════════════
function BlobPrev({ col, sword, costume }) {
  const ref=useRef(null),raf2=useRef(null),t=useRef(0);
  useEffect(()=>{
    const c=ref.current,ctx=c.getContext("2d");
    const loop=()=>{ t.current++; ctx.clearRect(0,0,90,90); drawBlob(ctx,45,52,col,1,t.current,true,false,false,false,costume||null); raf2.current=requestAnimationFrame(loop); };
    raf2.current=requestAnimationFrame(loop);
    return()=>cancelAnimationFrame(raf2.current);
  },[col,sword]);
  return <canvas ref={ref} width={90} height={90} style={{animation:"blobFloat 2s ease-in-out infinite"}}/>;
}

          <div style={{display:"flex",gap:8}}>
            {["Açık","Kapalı"].map(v2=>(
              <button key={v2} onClick={()=>onChange({...s,vibration:v2==="Açık"})}
                style={{flex:1,background:((s.vibration!==false)===( v2==="Açık"))?"rgba(167,139,250,0.35)":"rgba(255,255,255,0.06)",border:`1px solid ${((s.vibration!==false)===(v2==="Açık"))?"#a78bfa":"rgba(255,255,255,0.15)"}`,borderRadius:8,padding:"8px",color:(s.vibration!==false)===(v2==="Açık")?"#a78bfa":"#666",fontSize:11,cursor:"pointer",WebkitTapHighlightColor:"transparent"}}>
                {v2}
              </button>
            ))}
          </div>
        </div>

        {/* Grafik ayarları */}
        <div style={{color:"rgba(255,255,255,0.4)",fontSize:9,letterSpacing:4,marginBottom:10,marginTop:6}}>🖥️ GRAFİK</div>
        <div style={{marginBottom:14}}>
          <div style={{color:"rgba(255,255,255,0.55)",fontSize:11,letterSpacing:1,marginBottom:8}}>Parçacık Efektleri</div>
          <div style={{display:"flex",gap:8}}>
            {["Yüksek","Düşük","Kapalı"].map(v3=>(
              <button key={v3} onClick={()=>onChange({...s,particles:v3})}
                style={{flex:1,background:(s.particles||"Yüksek")===v3?"rgba(167,139,250,0.35)":"rgba(255,255,255,0.06)",border:`1px solid ${(s.particles||"Yüksek")===v3?"#a78bfa":"rgba(255,255,255,0.15)"}`,borderRadius:8,padding:"7px 4px",color:(s.particles||"Yüksek")===v3?"#a78bfa":"#666",fontSize:10,cursor:"pointer",WebkitTapHighlightColor:"transparent"}}>
                {v3}
              </button>
            ))}
          </div>
        </div>
        <div style={{marginBottom:14}}>
          <div style={{color:"rgba(255,255,255,0.55)",fontSize:11,letterSpacing:1,marginBottom:8}}>Ekran Titremesi</div>
          <div style={{display:"flex",gap:8}}>
            {["Açık","Kapalı"].map(v4=>(
              <button key={v4} onClick={()=>onChange({...s,screenShake:v4==="Açık"})}
                style={{flex:1,background:((s.screenShake!==false)===(v4==="Açık"))?"rgba(167,139,250,0.35)":"rgba(255,255,255,0.06)",border:`1px solid ${((s.screenShake!==false)===(v4==="Açık"))?"#a78bfa":"rgba(255,255,255,0.15)"}`,borderRadius:8,padding:"8px",color:(s.screenShake!==false)===(v4==="Açık")?"#a78bfa":"#666",fontSize:11,cursor:"pointer",WebkitTapHighlightColor:"transparent"}}>
                {v4}
              </button>
            ))}
          </div>
